---
apiVersion: v1
kind: Service
metadata:
  name: kerosene-lnd-headless
  labels:
    app.kubernetes.io/name: lnd
    app.kubernetes.io/component: lightning
spec:
  clusterIP: None
  selector:
    app: kerosene-lnd
  ports:
    - name: grpc
      port: 10009
      targetPort: grpc
      protocol: TCP
    - name: rest
      port: 8080
      targetPort: rest
      protocol: TCP
    - name: p2p
      port: 9735
      targetPort: p2p
      protocol: TCP
