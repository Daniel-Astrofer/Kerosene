apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: server
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfe-service
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: kfe-service
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-page
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: web-page
          imagePullPolicy: Never
          volumeMounts:
            - name: web-page-nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: web-page-runtime-config
              mountPath: /usr/share/nginx/html/kerosene-runtime-config.json
              subPath: kerosene-runtime-config.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 192Mi
      volumes:
        - name: web-page-nginx-conf
          configMap:
            name: web-page-nginx-conf
        - name: web-page-runtime-config
          configMap:
            name: web-page-runtime-config
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-sidecar
spec:
  template:
    spec:
      containers:
        - name: mpc-sidecar
          imagePullPolicy: Never
          env:
            - name: MPC_ALLOW_INSECURE_GRPC
              value: "true"
            - name: MPC_REQUIRE_MASTER_KEY
              value: "false"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kfe-service
spec:
  minReplicas: 1
  maxReplicas: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server
spec:
  minReplicas: 1
  maxReplicas: 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kfe-service
spec:
  minAvailable: 0
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: server
spec:
  minAvailable: 0
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-page
spec:
  minAvailable: 0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
data:
  SPRING_PROFILES_ACTIVE: "docker"
  SERVER_PORT: "8080"
  SPRING_DATA_REDIS_HOST: "kerosene-redis-headless"
  SPRING_DATA_REDIS_PORT: "6379"
  MPC_SIDECAR_HOST: "mpc-sidecar"
  MPC_SIDECAR_PORT: "50051"
  MPC_SIDECAR_TLS_ENABLED: "false"
  TOR_HEALTH_REQUIRED: "false"
  VAULT_RAFT_ENABLED: "false"
  VAULT_RAFT_REQUIRED: "false"
  VAULT_RAFT_URL: "http://kerosene-vault-raft-headless:8200"
  VAULT_RAFT_TOKEN: "local-root-token"
  VAULT_RAFT_TOKEN_FILE: ""
  VAULT_RAFT_EXPECTED_SERVERS: "1"
  VAULT_RAFT_TLS_INSECURE: "true"
  VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS: "180000"
  LIGHTNING_LND_ENABLED: "false"
  LIGHTNING_LND_HOST: "kerosene-lnd-headless"
  LIGHTNING_LND_PORT: "10009"
  LIGHTNING_LND_TLS_ENABLED: "false"
  BITCOIN_NETWORK: "regtest"
  BITCOIN_RPC_ENABLED: "true"
  BITCOIN_RPC_REQUIRED: "false"
  BITCOIN_RPC_PRUNED_REQUIRED: "false"
  BITCOIN_RPC_URL: "http://bitcoin-core:8332"
  BITCOIN_RPC_WALLET: "kerosene"
  TRANSACTIONS_BITCOIN_CORE_WALLET_ADDRESS_ENABLED: "true"
  KFE_RECEIVE_BITCOIN_CORE_WALLET_ADDRESS_ENABLED: "true"
  APP_DEV_DEPOSIT_INSTANT_CREDIT_ENABLED: "true"
  BITCOIN_ZMQ_ENABLED: "false"
  BITCOIN_ZMQ_RAWTX: "tcp://bitcoin-core:28332"
  BITCOIN_ZMQ_HASHBLOCK: "tcp://bitcoin-core:28333"
  REGION: "LOCAL"
  APP_CORS_ALLOWED_ORIGINS: "http://placeholder.onion"
  WEBAUTHN_ORIGINS: "android:apk-key-hash:kerosene,http://placeholder.onion"
  AUDIT_SOLVENCY_ENFORCED: "false"
  RELEASE_ATTESTATION_REQUIRED: "false"
  RELEASE_REMOTE_ATTESTATION_ENABLED: "false"
  QUORUM_ALLOW_LOCAL_SIMULATION: "true"
---
