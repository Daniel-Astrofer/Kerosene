apiVersion: v1
kind: ConfigMap
metadata:
  name: web-page-nginx-conf
data:
  default.conf: |
    upstream kerosene_core {
      server server:8080;
    }

    upstream kerosene_kfe {
      server kfe-service:8080;
    }

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:3000 http://localhost:3001 http://localhost:8080 http://localhost:8081 http://localhost:8082 http://localhost:30080 http://localhost:30082 http://127.0.0.1:3000 http://127.0.0.1:3001 http://127.0.0.1:8080 http://127.0.0.1:8081 http://127.0.0.1:8082 http://127.0.0.1:30080 http://127.0.0.1:30082 ws: wss:; worker-src 'self' blob:;" always;

      location /ws/ {
        proxy_pass http://kerosene_core;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
      }

      location = /health/ready {
        proxy_pass http://kerosene_core/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location = /kfe/health/ready {
        proxy_pass http://kerosene_kfe/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location ~ ^/(kfe|api/public/kfe|api/admin/kfe)(/|$) {
        proxy_pass http://kerosene_kfe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location ~ ^/(auth|notifications|api|sovereignty|actuator)(/|$) {
        proxy_pass http://kerosene_core;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location = /version.json {
        default_type application/json;
        alias /release/release-manifest.json;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
