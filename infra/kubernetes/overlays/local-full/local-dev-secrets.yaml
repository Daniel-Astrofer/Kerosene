# Local-only development credentials. Do not reuse these values outside the
# kerosene-local namespace or any shared environment.
apiVersion: v1
kind: Secret
metadata:
  name: kerosene-db-secrets
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    kerosene.io/local-only: "true"
type: Opaque
stringData:
  jdbc-url: jdbc:postgresql://kerosene-db-headless:5432/kerosene
  application-user: kerosene
  application-password: kerosene-local-password
  postgres-user: postgres
  postgres-password: postgres-local-password
---
apiVersion: v1
kind: Secret
metadata:
  name: kerosene-redis-secrets
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    kerosene.io/local-only: "true"
type: Opaque
stringData:
  redis-password: kerosene-local-redis
---
