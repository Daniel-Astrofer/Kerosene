apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-ha-default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-ha-allow-namespace-internal
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from: [{podSelector: {}}]
  egress:
    - to: [{podSelector: {}}]
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
