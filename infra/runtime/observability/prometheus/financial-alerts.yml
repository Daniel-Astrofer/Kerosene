groups:
  - name: kerosene-financial-reconciliation
    rules:
      - alert: KeroseneFinancialConfirmationRegression
        expr: increase(kerosene_financial_reconciliation_issue_total{type="CONFIRMATION_REGRESSION"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          domain: financial
        annotations:
          summary: "Blockchain confirmation regression detected"
          description: "At least one transfer moved to NEEDS_REVIEW because observed confirmations regressed."
          runbook: "backend/kerosene/docs/RUNBOOK_FINANCIAL_RECONCILIATION.md"

      - alert: KeroseneFinancialProviderSagaIncomplete
        expr: increase(kerosene_financial_reconciliation_issue_total{type="PROVIDER_SAGA_INCOMPLETE"}[10m]) > 0
        for: 0m
        labels:
          severity: high
          domain: financial
        annotations:
          summary: "External provider saga requires operator review"
          description: "A provider operation is stale or failed and was moved to NEEDS_REVIEW."
          runbook: "backend/kerosene/docs/RUNBOOK_FINANCIAL_RECONCILIATION.md"

      - alert: KeroseneFinancialOutboxNotDispatched
        expr: increase(kerosene_financial_reconciliation_issue_total{type="PROVIDER_OUTBOX_NOT_DISPATCHED"}[15m]) > 0
        for: 0m
        labels:
          severity: high
          domain: financial
        annotations:
          summary: "External provider outbox has undispatched operation"
          description: "A durable outbox record is due but has not reached DISPATCHED."
          runbook: "backend/kerosene/docs/RUNBOOK_FINANCIAL_RECONCILIATION.md"

      - alert: KeroseneFinancialRejectedValidationSpike
        expr: increase(kerosene_financial_validation_rejected_total[5m]) > 20
        for: 5m
        labels:
          severity: medium
          domain: financial
        annotations:
          summary: "Spike in rejected financial requests"
          description: "Financial validation rejects increased above the baseline threshold."

      - alert: KeroseneFinancialIdempotencyReplaySpike
        expr: increase(kerosene_financial_idempotency_reused_total[5m]) > 20
        for: 5m
        labels:
          severity: medium
          domain: financial
        annotations:
          summary: "Spike in idempotent replay handling"
          description: "A high number of reused idempotency keys may indicate retries or abuse."
