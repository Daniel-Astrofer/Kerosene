  web-admin:
    image: nginx:1.27-alpine
    container_name: kerosene-web-admin-local
    restart: "no"
    ports:
      - "${WEB_ADMIN_PORT:-3000}:8080"
    volumes:
      - ../../../frontend/build/web:/usr/share/nginx/html:ro,z
      - ../../runtime/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - ../../../release:/release:ro,z
    networks: [net_ingress]
    depends_on:
      server-wvo: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "test -s /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: kerosene-prometheus-local
    restart: "no"
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ../../runtime/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - prometheus_data:/prometheus
    networks: [net_ingress, net_tor]
    depends_on:
      server-wvo: { condition: service_healthy }
      server-iw5: { condition: service_healthy }
      server-ltv: { condition: service_healthy }

# ════════════════════════════════════════════════════════════════════════════
# Volumes
# ════════════════════════════════════════════════════════════════════════════
volumes:
  pg_data_is:
  pg_data_ch:
  pg_data_sg:
  redis_data_is:
  redis_data_ch:
  redis_data_sg:
  mpc_shards_is:
  mpc_shards_ch:
  mpc_shards_sg:
  tor_socks_is:
  tor_socks_ch:
  tor_socks_sg:
  tor_data_is:
  tor_data_ch:
  tor_data_sg:
  tor_control_is:
  tor_control_ch:
  tor_control_sg:
  vanguards_state_is:
  vanguards_state_ch:
  vanguards_state_sg:
  shard_identity_is:
  shard_identity_ch:
  shard_identity_sg:
  tor_keys_vault:
  tor_keys_is:
  tor_keys_ch:
  tor_keys_sg:
  lnd_data:
  bitcoin_core_data:
  bitcoin_indexer_data:
  vault_raft_1_data:
  vault_raft_2_data:
  vault_raft_3_data:
  vault_raft_bootstrap:
  prometheus_data:

# ════════════════════════════════════════════════════════════════════════════
# Networks — each shard is isolated; only net_tor and net_mpc are shared
# ════════════════════════════════════════════════════════════════════════════
networks:
  net_ingress:
    driver: bridge
  net_vault:
    driver: bridge
    internal: true    # Vault net has NO internet egress — only tor_egress for Tor
    ipam:
      config:
        - subnet: 10.242.0.0/24
  net_db_wvo:
    driver: bridge
    internal: true
  net_db_iw5:
    driver: bridge
    internal: true
  net_db_ltv:
    driver: bridge
    internal: true
  net_mpc:
    driver: bridge
    internal: true    # MPC sidecar coordination — air-gapped from internet
  net_bitcoin:
    driver: bridge
    internal: true    # Bitcoin Core pruned + optional local indexer
  net_tor:
    driver: bridge
    internal: true    # App↔Tor UDS volume bridge — no direct internet
    ipam:
      config:
        - subnet: 10.241.0.0/24
  tor_egress:
    driver: bridge    # Only Tor daemons have internet access via this network
