# Kerosene image contract.
#
# This file is the canonical inventory for image names, local tags,
# Dockerfiles and build contexts.
#
# dockerfile points to the canonical infra/ path. Legacy duplicates must be removed
# after active references are migrated.

images:
  server:
    image: kerosene/server
    local_tag: local
    dockerfile: infra/docker/images/server/Dockerfile
    context: backend/kerosene
    owner: backend

  kfe-service:
    image: kerosene/kfe-service
    local_tag: local
    dockerfile: infra/docker/images/kfe-service/Dockerfile
    context: backend/kerosene
    owner: kfe

  mpc-sidecar:
    image: kerosene/mpc-sidecar
    local_tag: local
    dockerfile: infra/docker/images/mpc-sidecar/Dockerfile
    context: backend/mpc-sidecar
    owner: mpc

  vault:
    image: kerosene/vault
    local_tag: local
    dockerfile: infra/docker/images/vault/Dockerfile
    context: backend/vault
    owner: security

  tor:
    image: kerosene/tor
    local_tag: local
    dockerfile: infra/docker/images/tor/Dockerfile
    context: infra/runtime/tor
    owner: network

  web-page:
    image: kerosene/web-page
    local_tag: local
    dockerfile: infra/docker/images/web-page/Dockerfile
    context: .
    owner: frontend
    notes: >-
      The web-page Kubernetes image now has a canonical Dockerfile. Legacy
      scripts may still keep fallback behavior during the migration window.
