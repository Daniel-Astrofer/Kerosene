name: Kerosene Production Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend Test And Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: backend/kerosene
        run: ./gradlew test --no-daemon

      - name: Build backend jar
        working-directory: backend/kerosene
        run: ./gradlew bootJar --no-daemon

      - name: Build backend Docker image
        run: docker build -t kerosene-api:${{ github.sha }} ./backend/kerosene

      - name: Dependency vulnerability scan
        if: github.event_name != 'pull_request'
        timeout-minutes: 45
        working-directory: backend/kerosene
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          test -n "$NVD_API_KEY"
          ./gradlew dependencyCheckAnalyze --no-daemon

  sidecar:
    name: Go Sidecar Test And Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/mpc-sidecar/go.mod
          cache-dependency-path: backend/mpc-sidecar/go.sum

      - name: Test MPC sidecar
        working-directory: backend/mpc-sidecar
        run: go test ./...

      - name: Build MPC sidecar Docker image
        run: docker build -t kerosene-mpc-sidecar:${{ github.sha }} ./backend/mpc-sidecar

  vault:
    name: Vault Build And Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build vault fat jar
        working-directory: backend/vault
        run: mvn -B package

      - name: Build vault Docker image
        run: docker build -t kerosene-vault:${{ github.sha }} ./backend/vault

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend compose file
        working-directory: backend/kerosene
        env:
          FOUNDER_TOTP_SECRET: ci-compose-founder-totp-secret
          VAULT_DIRECTOR_HMAC_SECRETS: director-1:ci-director-1,director-2:ci-director-2
          DIRECTOR_1_ARM_SIGNATURE: ci-director-1-signature
          DIRECTOR_2_ARM_SIGNATURE: ci-director-2-signature
          LND_WALLET_PASSWORD: ci-lnd-wallet-password
          MPC_MASTER_KEY_B64: Y2ktbXBjLW1hc3Rlci1rZXktMzItYnl0ZXMtcGxhY2Vob2xkZXI=
          QUORUM_SHARD_URLS: https://is-shard.onion,https://ch-shard.onion,https://sg-shard.onion
          BITCOIN_PLATFORM_MASTER_XPUB: xpub-ci-compose-placeholder
          VAULT_CLUSTER_ATTESTATION_SECRET: ci-compose-attestation-secret
          APP_CORS_ALLOWED_ORIGINS: https://app.kerosene.example
          WEBAUTHN_ORIGINS: https://app.kerosene.example
          WEBAUTHN_RP_ID: app.kerosene.example
        run: |
          cp .env.example .env
          docker compose --env-file .env -f deploy/compose/hardened.yml config --quiet

  frontend:
    name: Flutter Test And Release Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze Flutter
        working-directory: frontend
        run: flutter analyze --fatal-warnings --no-fatal-infos

      - name: Test Flutter
        working-directory: frontend
        run: flutter test

      - name: Build Flutter web
        working-directory: frontend
        run: flutter build web --release

      - name: Build Android release smoke
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          KEROSENE_ALLOW_DEBUG_RELEASE_SIGNING: "true"
        run: flutter build apk --release

      - name: Decode Android release keystore
        if: github.event_name != 'pull_request'
        working-directory: frontend
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          mkdir -p android/app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Build signed Android App Bundle
        if: github.event_name != 'pull_request'
        working-directory: frontend
        env:
          KEROSENE_UPLOAD_STORE_FILE: app/keystore/release.jks
          KEROSENE_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEROSENE_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEROSENE_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload Android App Bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kerosene-release-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
