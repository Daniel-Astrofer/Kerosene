    - 'assets/sounds/'
    - 'assets/logo/'

  shaders:
    - 'assets/shaders/bitcoin_hodl.frag'
    - 'assets/shaders/card_wood.frag'
    - 'assets/shaders/card_metal.frag'
    - 'assets/shaders/card_diamond.frag'
    - 'assets/shaders/card_ruby.frag'
    - 'assets/shaders/card_emerald.frag'
    - 'assets/shaders/hydra_logo.frag'

