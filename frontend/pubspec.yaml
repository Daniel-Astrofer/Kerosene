  bip39_mnemonic: ^4.0.1
  blockchain_utils: ^5.4.0
  qr_flutter: ^4.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.2.3
  dartz: ^0.10.1
  dio: ^5.4.3+1
  equatable: ^2.0.5
  timeago: ^3.5.0
  intl: ^0.20.2
  device_info_plus: ^11.2.0
  crypto: ^3.0.3

  bip39: ^1.0.6
  mobile_scanner: ^7.2.0
  nfc_manager: ^4.1.1
  nfc_manager_ndef: ^1.1.0
  web_socket_channel: ^3.0.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  sensors_plus: ^7.0.0
  path_provider: ^2.1.5
  stomp_dart_client: ^3.0.1
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1
  # bitcoin_flutter: ^1.0.12 # Removed due to null safety issues
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0

  audioplayers: ^6.0.0
  dio_smart_retry: ^7.0.1
  uuid: ^4.5.3
  tor: ^0.1.1
  socks5_proxy: ^1.0.6
  cryptography: ^2.7.0
  safe_device: ^1.3.8
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.2
  storybook_flutter: ^0.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
