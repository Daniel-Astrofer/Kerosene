name: 'teste'
description: 'Frontend of Kerosene'
publish_to: 'none'
version: '1.0.0+1'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  bip39_mnemonic: ^4.0.1
  blockchain_utils: ^5.4.0
  qr_flutter: ^4.1.0
  http: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.2.3
  dartz: ^0.10.1
  dio: ^5.4.3+1
  equatable: ^2.0.5
  timeago: ^3.5.0
  intl: ^0.20.2
  device_info_plus: ^11.2.0
  crypto: ^3.0.3

  bip39: ^1.0.6
  fl_chart: ^1.2.0
  mobile_scanner: ^7.2.0
  nfc_manager: ^4.1.1
  nfc_manager_ndef: ^1.1.0
  permission_handler: ^12.0.1
  web_socket_channel: ^3.0.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  sensors_plus: ^7.0.0
  path_provider: ^2.1.5
  stomp_dart_client: ^3.0.1
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1
  # bitcoin_flutter: ^1.0.12 # Removed due to null safety issues
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0

  audioplayers: ^6.0.0
  dio_smart_retry: ^7.0.1
  google_fonts: ^8.0.2
  slip39: ^0.3.0
  uuid: ^4.5.3
  flutter_svg: ^2.0.17
  package_info_plus: ^9.0.0
  tor: ^0.1.1
  socks5_proxy: ^1.0.6
  cryptography: ^2.7.0
  safe_device: ^1.3.8
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.2
  webview_flutter: ^4.13.1

  flutter_web_plugins:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.9

  local_auth_android: any
  local_auth_darwin: any
  local_auth_windows: any
flutter:
  uses-material-design: true
  generate: true

  assets:
    - 'assets/welcome_phone_mockup.png'
    - 'assets/sounds/'
    - 'assets/logo/'

  shaders:
    - 'assets/shaders/bitcoin_hodl.frag'
    - 'assets/shaders/card_wood.frag'
    - 'assets/shaders/card_metal.frag'
    - 'assets/shaders/card_diamond.frag'
    - 'assets/shaders/card_ruby.frag'
    - 'assets/shaders/card_emerald.frag'
    - 'assets/shaders/hydra_logo.frag'

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/kerosene-logo.png"
  min_sdk_android: 21
