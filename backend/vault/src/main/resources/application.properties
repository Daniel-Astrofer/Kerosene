server.port=8090

# ─── MODO "STEALTH" (Hardening) ─────────────────────────
# Mantém o mínimo de logs possíveis. Apenas WARN e INFO da pasta security.
logging.level.root=WARN
logging.level.org.springframework=ERROR
logging.level.org.apache.catalina=ERROR
logging.level.vault.security=INFO

# Nomes de erro mascarados. Não retorna Exception Stack Traces pro usuário.
server.error.include-exception=false
server.error.include-stacktrace=never
server.error.include-message=always

# Desabilita JMX Beans do Tomcat (previne Remote Code Executions em sub-sistemas)
spring.jmx.enabled=false
spring.main.banner-mode=off
spring.main.log-startup-info=false

# Limite estrito de conexões Tomcat — Não seremos DDOSados facilmente (aceita max 10 requests /s)
server.tomcat.max-connections=10
server.tomcat.accept-count=10
server.tomcat.threads.max=5
