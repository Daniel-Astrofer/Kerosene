apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kfe-service-network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kfe-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: server
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web-page
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mpc-sidecar
      ports:
        - protocol: TCP
          port: 50051
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
        - podSelector:
            matchLabels:
              app: kerosene-db-patroni
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
        - podSelector:
            matchLabels:
              app: kerosene-redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
        - podSelector:
            matchLabels:
              app: kerosene-vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: bitcoin-core
        - podSelector:
            matchLabels:
              app: kerosene-bitcoin
      ports:
        - protocol: TCP
          port: 8332
        - protocol: TCP
          port: 28332
        - protocol: TCP
          port: 28333
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: lnd
        - podSelector:
            matchLabels:
              app: kerosene-lnd
      ports:
        - protocol: TCP
          port: 10009
        - protocol: TCP
          port: 8080
