apiVersion: v1
kind: Service
metadata:
  name: kfe-service
  labels:
    app.kubernetes.io/name: kfe-service
    app.kubernetes.io/component: financial-engine
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kfe-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
