apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-admin-network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web-admin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kerosene-app
      ports:
        - protocol: TCP
          port: 8080
