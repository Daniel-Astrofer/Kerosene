apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mpc-sidecar-network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mpc-sidecar
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kerosene-app
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress: []
