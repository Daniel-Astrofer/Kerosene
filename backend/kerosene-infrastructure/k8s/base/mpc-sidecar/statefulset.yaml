apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-sidecar
  labels:
    app.kubernetes.io/name: mpc-sidecar
    app.kubernetes.io/component: crypto-sidecar
spec:
  serviceName: mpc-sidecar-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: mpc-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mpc-sidecar
        app.kubernetes.io/component: crypto-sidecar
        kerosene.io/scrape: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /version
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: mpc-sidecar
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mpc-sidecar
          image: kerosene/mpc-sidecar:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http-health
              containerPort: 8081
              protocol: TCP
          env:
            - name: MPC_ALLOW_INSECURE_GRPC
              value: "false"
            - name: MPC_REQUIRE_MASTER_KEY
              value: "true"
            - name: MPC_TLS_CERT_FILE
              value: /tls/tls.crt
            - name: MPC_TLS_KEY_FILE
              value: /tls/tls.key
            - name: MPC_TLS_CA_FILE
              value: /tls/ca.crt
            - name: MPC_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: kerosene-mpc-secrets
                  key: master-key
          startupProbe:
            httpGet:
              path: /version
              port: http-health
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /version
              port: http-health
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /version
              port: http-health
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: mpc-shards-tmp
              mountPath: /mnt/mpc-shards
            - name: encrypted-shards
              mountPath: /app/encrypted-shards
            - name: mpc-tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
        - name: mpc-shards-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: mpc-tls
          secret:
            secretName: kerosene-mpc-tls
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: encrypted-shards
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
