apiVersion: v1
kind: Service
metadata:
  name: mpc-sidecar
  labels:
    app.kubernetes.io/name: mpc-sidecar
    app.kubernetes.io/component: crypto-sidecar
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mpc-sidecar
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http-health
      port: 8081
      targetPort: http-health
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-sidecar-headless
  labels:
    app.kubernetes.io/name: mpc-sidecar
    app.kubernetes.io/component: crypto-sidecar
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: mpc-sidecar
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http-health
      port: 8081
      targetPort: http-health
      protocol: TCP
