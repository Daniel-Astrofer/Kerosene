# Example for External Secrets Operator. This is a contract example only.
# It assumes a ClusterSecretStore named `kerosene-vault-store` already exists.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kerosene-db-secrets
  namespace: kerosene-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kerosene-vault-store
  target:
    name: kerosene-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: jdbc-url
      remoteRef:
        key: production/database
        property: jdbc-url
    - secretKey: application-user
      remoteRef:
        key: production/database
        property: application-user
    - secretKey: application-password
      remoteRef:
        key: production/database
        property: application-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: server-secrets
  namespace: kerosene-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kerosene-vault-store
  target:
    name: server-secrets
    creationPolicy: Owner
  data:
    - secretKey: shard-attestation-secret
      remoteRef:
        key: production/app
        property: shard-attestation-secret
    - secretKey: release-attestation-secret
      remoteRef:
        key: production/app
        property: release-attestation-secret
    - secretKey: kfe-internal-shared-secret
      remoteRef:
        key: production/app
        property: kfe-internal-shared-secret
