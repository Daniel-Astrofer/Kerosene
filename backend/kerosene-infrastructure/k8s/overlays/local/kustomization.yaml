apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kerosene-local
resources:
  - ../../base
  - namespace.yaml
labels:
  - pairs:
      app.kubernetes.io/environment: local
images:
  - name: kerosene/kerosene-app
    newTag: local
  - name: kerosene/mpc-sidecar
    newTag: local
  - name: kerosene/web-admin
    newTag: local
patches:
  - path: patch-local.yaml
