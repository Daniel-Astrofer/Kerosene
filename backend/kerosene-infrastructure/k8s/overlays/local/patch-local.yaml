apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: server
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-sidecar
spec:
  template:
    spec:
      containers:
        - name: mpc-sidecar
          imagePullPolicy: Never
          env:
            - name: MPC_ALLOW_INSECURE_GRPC
              value: "true"
            - name: MPC_REQUIRE_MASTER_KEY
              value: "false"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server
spec:
  minReplicas: 1
  maxReplicas: 2
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: server
spec:
  minAvailable: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
data:
  SPRING_PROFILES_ACTIVE: "docker"
  KEROSENE_RUNTIME_ROLE: "core-service"
  BITCOIN_NETWORK: "signet"
  REGION: "LOCAL"
  AUDIT_SOLVENCY_ENFORCED: "false"
  RELEASE_ATTESTATION_REQUIRED: "false"
  RELEASE_REMOTE_ATTESTATION_ENABLED: "false"
  MPC_SIDECAR_TLS_ENABLED: "false"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfe-service
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: kfe-service
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kfe-service
spec:
  minReplicas: 1
  maxReplicas: 2
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kfe-service
spec:
  minAvailable: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kfe-service-config
data:
  SPRING_PROFILES_ACTIVE: "docker,kfe"
  SERVER_PORT: "8080"
  KEROSENE_RUNTIME_ROLE: "kfe-service"
  BITCOIN_NETWORK: "signet"
  REGION: "LOCAL"
  AUDIT_SOLVENCY_ENFORCED: "false"
  RELEASE_ATTESTATION_REQUIRED: "false"
  RELEASE_REMOTE_ATTESTATION_ENABLED: "false"
  MPC_SIDECAR_TLS_ENABLED: "false"
  TOR_HEALTH_REQUIRED: "false"
  VAULT_RAFT_ENABLED: "false"
  VAULT_RAFT_REQUIRED: "false"
  LIGHTNING_LND_ENABLED: "false"
  LIGHTNING_LND_TLS_ENABLED: "false"
  BITCOIN_RPC_REQUIRED: "false"
  BITCOIN_RPC_PRUNED_REQUIRED: "false"
  BITCOIN_ZMQ_ENABLED: "false"
  QUORUM_ALLOW_LOCAL_SIMULATION: "true"
