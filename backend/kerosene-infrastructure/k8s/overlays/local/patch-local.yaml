apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerosene-app
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: kerosene-app
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-sidecar
spec:
  template:
    spec:
      containers:
        - name: mpc-sidecar
          imagePullPolicy: Never
          env:
            - name: MPC_ALLOW_INSECURE_GRPC
              value: "true"
            - name: MPC_REQUIRE_MASTER_KEY
              value: "false"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kerosene-app
spec:
  minReplicas: 1
  maxReplicas: 2
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kerosene-app
spec:
  minAvailable: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kerosene-app-config
data:
  SPRING_PROFILES_ACTIVE: "docker"
  BITCOIN_NETWORK: "signet"
  REGION: "LOCAL"
  AUDIT_SOLVENCY_ENFORCED: "false"
  RELEASE_ATTESTATION_REQUIRED: "false"
  RELEASE_REMOTE_ATTESTATION_ENABLED: "false"
  MPC_SIDECAR_TLS_ENABLED: "false"
