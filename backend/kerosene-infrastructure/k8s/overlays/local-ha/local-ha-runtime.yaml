---
apiVersion: v1
kind: Service
metadata:
  name: web-page
  labels:
    app: web-page
spec:
  type: NodePort
  selector:
    app: web-page
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 31090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-page
  labels:
    app: web-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-page
  template:
    metadata:
      labels:
        app: web-page
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-page
          image: kerosene/web-page:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
