apiVersion: v1
kind: Service
metadata:
  name: bitcoin-core
  labels:
    app: bitcoin-core
spec:
  selector:
    app: bitcoin-core
  ports:
    - name: rpc
      port: 8332
      targetPort: rpc
    - name: p2p
      port: 8333
      targetPort: p2p
    - name: zmq-block
      port: 28332
      targetPort: zmq-block
    - name: zmq-tx
      port: 28333
      targetPort: zmq-tx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoin-core
  labels:
    app: bitcoin-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin-core
  template:
    metadata:
      labels:
        app: bitcoin-core
    spec:
      containers:
        - name: bitcoind
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "local-ha bitcoin placeholder ready"
              while true; do nc -lk -p 8332 >/dev/null 2>&1; done
          ports:
            - name: rpc
              containerPort: 8332
            - name: p2p
              containerPort: 8333
            - name: zmq-block
              containerPort: 28332
            - name: zmq-tx
              containerPort: 28333
          readinessProbe:
            tcpSocket:
              port: rpc
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bitcoin-data
              mountPath: /home/bitcoin/.bitcoin
      volumes:
        - name: bitcoin-data
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: server
  labels:
    app: server
spec:
  selector:
    app: server-wvo
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: kfe-service
  labels:
    app: kfe-service
spec:
