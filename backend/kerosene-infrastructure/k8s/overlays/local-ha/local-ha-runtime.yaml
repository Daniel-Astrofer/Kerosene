apiVersion: v1
kind: Service
metadata:
  name: db-wvo
  labels:
    app: db-wvo
spec:
  selector:
    app: db-wvo
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-wvo
  labels:
    app: db-wvo
spec:
  serviceName: db-wvo
  replicas: 1
  selector:
    matchLabels:
      app: db-wvo
  template:
    metadata:
      labels:
        app: db-wvo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: kerosene
            - name: POSTGRES_USER
              value: kerosene
            - name: POSTGRES_PASSWORD
              value: kerosene-dev
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kerosene", "-d", "kerosene"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-wvo
  labels:
    app: redis-wvo
spec:
  selector:
    app: redis-wvo
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-wvo
  labels:
    app: redis-wvo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-wvo
  template:
    metadata:
      labels:
        app: redis-wvo
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args: ["exec redis-server --appendonly yes --requirepass kerosene-dev"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a kerosene-dev ping | grep PONG"]
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-sidecar-wvo
  labels:
    app: mpc-sidecar-wvo
spec:
  type: NodePort
  selector:
    app: mpc-sidecar-wvo
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: health
      port: 8081
      targetPort: health
      nodePort: 31180
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-sidecar-wvo
  labels:
    app: mpc-sidecar-wvo
spec:
  serviceName: mpc-sidecar-wvo
  replicas: 1
  selector:
    matchLabels:
      app: mpc-sidecar-wvo
  template:
    metadata:
      labels:
        app: mpc-sidecar-wvo
    spec:
      containers:
        - name: mpc-sidecar
          image: kerosene/mpc-sidecar:local
          imagePullPolicy: Never
          env:
            - name: MPC_ALLOW_INSECURE_GRPC
              value: "true"
            - name: MPC_REQUIRE_MASTER_KEY
              value: "false"
            - name: MPC_RUNTIME_MODE
              value: LOCAL_DEV_SIGNER
          ports:
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /version
              port: health
          volumeMounts:
            - name: shards
              mountPath: /app/encrypted-shards
      volumes:
        - name: shards
          emptyDir:
            sizeLimit: 256Mi
---
