    - name: http
      port: 8080
      targetPort: http
      nodePort: 31080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-wvo
  labels:
    app: server-wvo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server-wvo
  template:
    metadata:
      labels:
        app: server-wvo
    spec:
      containers:
        - name: server
          image: kerosene/server:local
          imagePullPolicy: Never
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: KEROSENE_RUNTIME_ROLE
              value: core-service
            - name: KFE_REMOTE_BASE_URL
              value: http://kfe-service-wvo:8080
            - name: KFE_REMOTE_WALLET_PROVISIONING_ENABLED
              value: "true"
            - name: KFE_INTERNAL_SHARED_SECRET
              value: local-ha-kfe-internal-secret
            - name: SERVER_PORT
              value: "8080"
            - name: REGION
              value: WVO
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db-wvo:5432/kerosene?ssl=false
            - name: SPRING_DATASOURCE_USERNAME
              value: kerosene
            - name: SPRING_DATASOURCE_PASSWORD
              value: kerosene-dev
            - name: SPRING_DATA_REDIS_HOST
              value: redis-wvo
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              value: kerosene-dev
            - name: MPC_SIDECAR_HOST
              value: mpc-sidecar-wvo
            - name: MPC_SIDECAR_PORT
              value: "50051"
            - name: MPC_SIDECAR_TLS_ENABLED
              value: "false"
            - name: VAULT_ENABLED
              value: "false"
            - name: VAULT_RAFT_ENABLED
              value: "false"
            - name: VAULT_RAFT_REQUIRED
              value: "false"
            - name: VAULT_RAFT_URL
              value: http://vault-raft-1:8200
            - name: VAULT_RAFT_EXPECTED_SERVERS
              value: "3"
            - name: VAULT_RAFT_TLS_INSECURE
              value: "true"
            - name: TOR_HEALTH_REQUIRED
              value: "false"
            - name: tor.health.required
              value: "false"
            - name: LIGHTNING_LND_ENABLED
              value: "false"
            - name: LIGHTNING_LND_TLS_ENABLED
              value: "false"
            - name: BITCOIN_NETWORK
              value: regtest
            - name: BITCOIN_RPC_ENABLED
              value: "true"
            - name: BITCOIN_RPC_REQUIRED
              value: "false"
            - name: BITCOIN_RPC_PRUNED_REQUIRED
              value: "false"
            - name: BITCOIN_RPC_URL
              value: http://bitcoin-core:8332
            - name: BITCOIN_RPC_USER
              value: kerosene
            - name: BITCOIN_RPC_PASSWORD
              value: kerosene-dev
            - name: BITCOIN_ZMQ_ENABLED
              value: "false"
            - name: FLYWAY_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            failureThreshold: 18
---
