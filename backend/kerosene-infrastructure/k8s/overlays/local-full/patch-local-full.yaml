  AUDIT_SOLVENCY_ENFORCED: "false"
  RELEASE_ATTESTATION_REQUIRED: "false"
  RELEASE_REMOTE_ATTESTATION_ENABLED: "false"
  QUORUM_ALLOW_LOCAL_SIMULATION: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: server
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: web-page
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
      nodePort: 30082
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-sidecar
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http-health
      port: 8081
      targetPort: http-health
      protocol: TCP
      nodePort: 30081
