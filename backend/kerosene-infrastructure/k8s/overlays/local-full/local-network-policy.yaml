# Local-full intentionally relaxes namespace-internal traffic so the developer
# stack can boot without carrying production service-mesh assumptions into a
# single-node workstation cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-full-allow-namespace-internal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-full-allow-nodeport-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - server
          - web-page
          - mpc-sidecar
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 50051
