# ═══════════════════════════════════════════════════════════════════════════════
# Kerosene Bitcoin Core Full Node Configuration (PRODUCTION)
# ═══════════════════════════════════════════════════════════════════════════════
# Run in mainnet
chain=main

# Allow JSON-RPC and ZMQ from local network (LND)
server=1
txindex=1

# Bind RPC and ZMQ
bind=0.0.0.0
rpcbind=0.0.0.0
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16

# ZMQ settings for LND
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333

# Performance / Hardware
# Minimum 4GB RAM is required for dbcache=2048
dbcache=2048
maxmempool=500
maxconnections=40

# Expose via Tor (Sovereignty)
proxy=127.0.0.1:9050
listen=1
listenonion=1
onlynet=onion
discover=0

# RPC Auth (Must be overridden via environment or generated hash)
# rpcauth=kerosene:...
