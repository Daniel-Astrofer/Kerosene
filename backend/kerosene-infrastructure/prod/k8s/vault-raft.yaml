apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kerosene-vault
  namespace: kerosene-production
spec:
  serviceName: kerosene-vault-headless
  replicas: 3
  selector:
    matchLabels:
      app: kerosene-vault
  template:
    metadata:
      labels:
        app: kerosene-vault
    spec:
      securityContext:
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: vault
        image: hashicorp/vault:1.17.6
        command: ["vault", "server", "-config", "/vault/config/vault.hcl"]
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        ports:
        - containerPort: 8200
          name: vault-api
        - containerPort: 8201
          name: vault-cluster
        env:
        - name: VAULT_API_ADDR
          value: "http://$(POD_IP):8200"
        - name: VAULT_CLUSTER_ADDR
          value: "http://$(POD_IP):8201"
        volumeMounts:
        - name: vault-data
          mountPath: /vault/file
        - name: vault-config
          mountPath: /vault/config
      volumes:
      - name: vault-config
        configMap:
          name: vault-config
  volumeClaimTemplates:
  - metadata:
      name: vault-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-luks-encrypted"
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: kerosene-production
data:
  vault.hcl: |
    ui = true
    disable_mlock = false

    storage "raft" {
      path    = "/vault/file"
      node_id = "${NODE_NAME}"
      
      # The cluster relies on other peers
      retry_join {
        leader_api_addr = "http://kerosene-vault-0.kerosene-vault-headless:8200"
      }
      retry_join {
        leader_api_addr = "http://kerosene-vault-1.kerosene-vault-headless:8200"
      }
      retry_join {
        leader_api_addr = "http://kerosene-vault-2.kerosene-vault-headless:8200"
      }
    }

    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = "true" # TLS handled by Tor Onion Encryption natively
    }

    api_addr = "http://0.0.0.0:8200"
    cluster_addr = "http://0.0.0.0:8201"
