apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kerosene-redis-sentinel
  namespace: kerosene-production
spec:
  serviceName: kerosene-redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: kerosene-redis
  template:
    metadata:
      labels:
        app: kerosene-redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        command:
          - "redis-server"
          - "--requirepass"
          - "$(REDIS_PASSWORD)"
          - "--masterauth"
          - "$(REDIS_PASSWORD)"
          - "--appendonly"
          - "yes"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kerosene-redis-secrets
              key: redis-password
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
      - name: sentinel
        image: redis:7.2-alpine
        command:
          - "redis-sentinel"
          - "/etc/redis/sentinel.conf"
        ports:
        - containerPort: 26379
          name: sentinel
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kerosene-redis
            topologyKey: "kubernetes.io/hostname"
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "local-luks-encrypted"
      resources:
        requests:
          storage: 10Gi
