apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: kerosene-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: server
        image: kerosene/server:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://kerosene-db-headless:5432/kerosene"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: kerosene-db-secrets
              key: application-user
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kerosene-db-secrets
              key: application-password
        - name: SPRING_DATA_REDIS_HOST
          value: "kerosene-redis-headless"
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kerosene-redis-secrets
              key: redis-password
        - name: FLYWAY_BASELINE_ON_MIGRATE
          value: "false"
        - name: LIGHTNING_LND_HOST
          value: "kerosene-lnd-headless"
        - name: LIGHTNING_LND_MACAROON
          valueFrom:
            secretKeyRef:
              name: kerosene-lnd-secrets
              key: admin-macaroon
        - name: VAULT_RAFT_URL
          value: "https://kerosene-vault-raft-headless:8200"
        - name: VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS
          value: "1800000" # 30 minutes in prod due to Tor DHT latency
        - name: MPC_SIDECAR_HOST
          value: "kerosene-mpc-sidecar-headless"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - server
              topologyKey: "kubernetes.io/hostname"
