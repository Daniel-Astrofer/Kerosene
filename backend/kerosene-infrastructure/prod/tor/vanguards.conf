# ═══════════════════════════════════════════════════════════════════════════════
# Kerosene Vanguards Add-on Configuration (PRODUCTION)
# ═══════════════════════════════════════════════════════════════════════════════
[Global]
# Log level: info, notice, warn, error
loglevel = notice
logfile = /var/log/tor/vanguards.log

[Vanguards]
# Layer 2 guards: Mitigate Guard Discovery (Sybils)
num_layer2_guards = 3
layer2_lifetime_days = 90
max_layer2_lifetime_days = 120

# Layer 3 guards: Mitigate Hidden Service De-anonymization
num_layer3_guards = 6
layer3_lifetime_days = 24
max_layer3_lifetime_days = 48

[Bandwidth]
# Limit excessive circuit creations (Sybil/DoS)
circ_max_megabytes = 0
circ_max_age_hours = 24

[Rendezvous]
# Detect and terminate long-lived rendezvous connections (to prevent traffic analysis)
max_rendezvous_use_hours = 12
