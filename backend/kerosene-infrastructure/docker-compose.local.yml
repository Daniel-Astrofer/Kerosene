# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.local.yml — Kerosene Full-Cluster Local Simulation
# ─────────────────────────────────────────────────────────────────────────────
# Simulates the full Hydra (IS + CH + SG + Vault) on a single machine.
# Uses production images (Debian Bookworm builder + Distroless runtime).
#
# BEFORE RUNNING:
#   1. Run: bash scripts/init-local.sh
#   2. Ensure backend/kerosene/.env is populated (no default fallbacks allowed)
#
# USAGE:
#   bash scripts/start-local.sh
#
# ⚠️  LOCAL ONLY — Not identical to production topology (multi-host).
#     In production each region runs on a dedicated bare-metal machine.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════════════════════════════════════════
  # VAULT (Hardware Attestation + Key Provisioning)
  # Reachable ONLY via kerosene-tor-vault onion — no host port binding.
  # ════════════════════════════════════════════════════════════════════════════
  kerosene-vault:
    build:
      context: ../vault
      dockerfile: ../kerosene-infrastructure/images/vault/Dockerfile
    container_name: kerosene-vault-local
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [IPC_LOCK]
    security_opt:
      - no-new-privileges:true
      # - seccomp:../kerosene/deploy/seccomp-profile.json
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    env_file: ../kerosene/.env
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - FOUNDER_TOTP_SECRET=${FOUNDER_TOTP_SECRET}
    networks:
      net_vault:
        ipv4_address: 172.24.0.10

  kerosene-tor-vault:
    build:
      context: ../kerosene/tor
      dockerfile: Dockerfile
    container_name: kerosene-tor-vault-local
    environment:
      - EXPECTED_TOR_HASH=${EXPECTED_TOR_HASH:-}
    volumes:
      - ../kerosene/tor/torrc-vault:/etc/tor/torrc:ro,z
      - ../kerosene/tor/entrypoint.sh:/entrypoint.sh:ro,z
      - tor_keys_vault:/var/lib/tor/kerosene_service
    # Removed authorized_clients mount from inside HiddenServiceDir to fix Read-only FS error
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_vault, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on: [kerosene-vault]

  kerosene-vault-arm:
    image: curlimages/curl:8.10.1
    container_name: kerosene-vault-arm-local
    restart: "no"
    env_file: ../kerosene/.env
    environment:
      - VAULT_URL=http://kerosene-vault:8090/v1/vault/arm
      - VAULT_ARM_MAX_WAIT_SECONDS=120
    volumes:
      - ../../scripts/arm-vault-compose.sh:/arm-vault.sh:ro,z
    entrypoint: ["sh", "/arm-vault.sh"]
    networks: [net_vault]
    depends_on:
      kerosene-vault: { condition: service_started }

  # ════════════════════════════════════════════════════════════════════════════
  # ICELAND shard (IS)
  # ════════════════════════════════════════════════════════════════════════════
  db-is:
    image: postgres:17-bookworm
    container_name: kerosene_db_is_local
    env_file: ../kerosene/.env
    environment:
      - POSTGRES_DB=kerosene
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--locale=C.UTF-8 --encoding=UTF8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - REQUIRE_MTLS=false
    volumes:
      - pg_data_is:/var/lib/postgresql/data
      - ../kerosene/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:z
    networks: [net_db_is]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kerosene"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-is:
    image: redis:7-alpine
    container_name: kerosene_redis_is_local
    env_file: ../kerosene/.env
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes: [redis_data_is:/data]
    networks: [net_db_is]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  mpc-sidecar-is:
    build:
      context: ../mpc-sidecar
      dockerfile: Dockerfile
    container_name: mpc-sidecar-is-local
    restart: unless-stopped
    environment:
      - MPC_ALLOW_INSECURE_GRPC=true
    tmpfs:
      - /mnt/mpc-shards:rw,noexec,nosuid,size=64m
    volumes:
      - mpc_shards_is:/app/encrypted-shards
    networks: [net_mpc]
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 50051"]
      interval: 5s
      timeout: 5s
      retries: 12

  kerosene-tor-is:
    build:
      context: ../kerosene/tor
      dockerfile: Dockerfile
    container_name: kerosene-tor-is-local
    environment:
      - EXPECTED_TOR_HASH=${EXPECTED_TOR_HASH:-}
    volumes:
      - tor_data_is:/var/lib/tor
      - ../kerosene/tor/torrc-is:/etc/tor/torrc:ro,z
      - ../kerosene/tor/entrypoint.sh:/entrypoint.sh:ro,z
      - tor_keys_is:/var/lib/tor/kerosene_service
      - tor_socks_is:/var/run/tor/socks
      - tor_control_is:/var/run/tor/control
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_db_is, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
      interval: 5s
      timeout: 5s
      retries: 24

  shard-identity-init-is:
    image: alpine:3.20
    container_name: kerosene-shard-identity-init-is-local
    command: ["sh", "-c", "mkdir -p /identity && chown -R 65532:65532 /identity && chmod 700 /identity"]
    restart: "no"
    network_mode: none
    volumes:
      - shard_identity_is:/identity

  kerosene-app-is:
    build:
      context: ../kerosene
      dockerfile: ../kerosene-infrastructure/images/app/Dockerfile
    container_name: kerosene-app-is-local
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [IPC_LOCK]
    security_opt:
      - no-new-privileges:true
      # - seccomp:../kerosene/deploy/seccomp-profile.json
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
      - /opt/kerosene:rw,noexec,nosuid,size=10m
    volumes:
      - ../kerosene/deploy/panic.sh:/opt/kerosene/panic.sh:ro,z
      - ../kerosene/certs:/certs:ro,z
      - tor_socks_is:/var/run/tor/socks
      - vanguards_state_is:/var/run/tor/vanguards:ro
      - tor_keys_vault:/vault-onion:ro
      - shard_identity_is:/opt/kerosene/identity
    env_file: ../kerosene/.env
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://kerosene_db_is_local:5432/kerosene?ssl=false
      - REGION=IS
      - MPC_SIDECAR_HOST=mpc-sidecar-is
      - MPC_SIDECAR_TLS_ENABLED=false
      - AUDIT_SOLVENCY_ENFORCED=false
      - SPRING_DATA_REDIS_HOST=kerosene_redis_is_local
      - VAULT_ENABLED=true
      - VAULT_URL=http://kerosene-vault:8090
      - VAULT_ONION_FILE=/vault-onion/hostname
      - VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS=180000
      - SHARD_IDENTITY_PATH=/opt/kerosene/identity
      - TOR_HEALTH_VANGUARDS_STATE_FILE=/var/run/tor/vanguards/vanguards.state
    ports:
      - "8080:8080"
    networks: [net_ingress, net_db_is, net_mpc, net_tor, net_vault]
    depends_on:
      db-is: { condition: service_healthy }
      redis-is: { condition: service_healthy }
      mpc-sidecar-is: { condition: service_healthy }
      kerosene-vault-arm: { condition: service_completed_successfully }
      kerosene-tor-is: { condition: service_healthy }
      kerosene-vanguards-is: { condition: service_healthy }
      shard-identity-init-is: { condition: service_completed_successfully }

  kerosene-vanguards-is:
    build:
      context: ../kerosene/tor/vanguards
      dockerfile: Dockerfile
    container_name: kerosene-vanguards-is-local
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,size=16m,mode=1777
    volumes:
      - tor_control_is:/var/run/tor/control:ro
      - tor_data_is:/var/lib/tor:ro
      - vanguards_state_is:/var/lib/vanguards
    network_mode: none
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/vanguards-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on:
      kerosene-tor-is: { condition: service_healthy }

