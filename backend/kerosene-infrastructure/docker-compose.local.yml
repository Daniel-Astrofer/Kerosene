# ════════════════════════════════════════════════════════════════════════════
# Volumes
# ════════════════════════════════════════════════════════════════════════════
volumes:
  pg_data_is:
  pg_data_ch:
  pg_data_sg:
  redis_data_is:
  redis_data_ch:
  redis_data_sg:
  mpc_shards_is:
  mpc_shards_ch:
  mpc_shards_sg:
  tor_socks_is:
  tor_socks_ch:
  tor_socks_sg:
  shard_identity_is:
  shard_identity_ch:
  shard_identity_sg:
  tor_keys_vault:
  tor_keys_is:
  tor_keys_ch:
  tor_keys_sg:

# ════════════════════════════════════════════════════════════════════════════
# Networks — each shard is isolated; only net_tor and net_mpc are shared
# ════════════════════════════════════════════════════════════════════════════
networks:
  net_vault:
    driver: bridge
    internal: true    # Vault net has NO internet egress — only tor_egress for Tor
  net_db_is:
    driver: bridge
    internal: true
  net_db_ch:
    driver: bridge
    internal: true
  net_db_sg:
    driver: bridge
    internal: true
  net_mpc:
    driver: bridge
    internal: true    # MPC sidecar coordination — air-gapped from internet
  net_tor:
    driver: bridge
    internal: true    # App↔Tor UDS volume bridge — no direct internet
  tor_egress:
    driver: bridge    # Only Tor daemons have internet access via this network
