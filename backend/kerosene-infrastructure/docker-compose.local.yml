# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.local.yml — Kerosene Full-Cluster Local Simulation
# ─────────────────────────────────────────────────────────────────────────────
# Simulates the full Hydra (IS + CH + SG + Vault) on a single machine.
# Uses production images (Debian Bookworm builder + Distroless runtime).
#
# BEFORE RUNNING:
#   1. Run: bash scripts/init-local.sh
#   2. Ensure backend/kerosene/.env is populated (no default fallbacks allowed)
#
# USAGE:
#   bash scripts/start-local.sh
#
# ⚠️  LOCAL ONLY — Not identical to production topology (multi-host).
#     In production each region runs on a dedicated bare-metal machine.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════════════════════════════════════════
  # VAULT (Hardware Attestation + Key Provisioning)
  # Reachable ONLY via kerosene-tor-vault onion — no host port binding.
  # ════════════════════════════════════════════════════════════════════════════
  kerosene-vault:
    build:
      context: ../vault
      dockerfile: ../kerosene-infrastructure/images/vault/Dockerfile
    container_name: kerosene-vault-local
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [IPC_LOCK]
    security_opt:
      - no-new-privileges:true
      # - seccomp:../kerosene/deploy/seccomp-profile.json
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    env_file: ../kerosene/.env
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - FOUNDER_TOTP_SECRET=${FOUNDER_TOTP_SECRET}
    networks: [net_vault]

  kerosene-tor-vault:
    build:
      context: ../kerosene/tor
      dockerfile: Dockerfile
    container_name: kerosene-tor-vault-local
    environment:
      - EXPECTED_TOR_HASH=${EXPECTED_TOR_HASH:-}
    volumes:
      - ../kerosene/tor/torrc-vault:/etc/tor/torrc:ro,z
      - ../kerosene/tor/entrypoint.sh:/entrypoint.sh:ro,z
      - tor_keys_vault:/var/lib/tor/kerosene_service
    # Removed authorized_clients mount from inside HiddenServiceDir to fix Read-only FS error
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_vault, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on: [kerosene-vault]

  # ════════════════════════════════════════════════════════════════════════════
  # ICELAND shard (IS)
  # ════════════════════════════════════════════════════════════════════════════
  db-is:
    image: postgres:17-bookworm
    container_name: kerosene_db_is_local
    env_file: ../kerosene/.env
    environment:
      - POSTGRES_DB=kerosene
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--locale=C.UTF-8 --encoding=UTF8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - REQUIRE_MTLS=false
    volumes:
      - pg_data_is:/var/lib/postgresql/data
      - ../kerosene/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:z
    networks: [net_db_is]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kerosene"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-is:
    image: redis:7-alpine
    container_name: kerosene_redis_is_local
    env_file: ../kerosene/.env
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes: [redis_data_is:/data]
    networks: [net_db_is]

  mpc-sidecar-is:
    build:
      context: ../mpc-sidecar
      dockerfile: Dockerfile
    container_name: mpc-sidecar-is-local
    restart: unless-stopped
    tmpfs:
      - /mnt/mpc-shards:rw,noexec,nosuid,size=64m
    volumes:
      - mpc_shards_is:/app/encrypted-shards
    networks: [net_mpc]

  kerosene-tor-is:
    build:
      context: ../kerosene/tor
      dockerfile: Dockerfile
    container_name: kerosene-tor-is-local
    environment:
      - EXPECTED_TOR_HASH=${EXPECTED_TOR_HASH:-}
    volumes:
      - ../kerosene/tor/torrc-is:/etc/tor/torrc:ro,z
      - ../kerosene/tor/entrypoint.sh:/entrypoint.sh:ro,z
      - tor_keys_is:/var/lib/tor/kerosene_service
      - tor_socks_is:/var/run/tor/socks
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_db_is, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on: [kerosene-app-is]

  kerosene-app-is:
    build:
      context: ../kerosene
      dockerfile: ../kerosene-infrastructure/images/app/Dockerfile
    container_name: kerosene-app-is-local
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [IPC_LOCK]
    security_opt:
      - no-new-privileges:true
      # - seccomp:../kerosene/deploy/seccomp-profile.json
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
      - /opt/kerosene:rw,noexec,nosuid,size=10m
    volumes:
      - ../kerosene/deploy/panic.sh:/opt/kerosene/panic.sh:ro,z
      - ../kerosene/certs:/certs:ro,z
      - tor_socks_is:/var/run/tor/socks
      - tor_keys_vault:/vault-onion:ro
      - shard_identity_is:/opt/kerosene/identity
    env_file: ../kerosene/.env
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://kerosene_db_is_local:5432/kerosene?ssl=false
      - REGION=IS
      - MPC_SIDECAR_HOST=mpc-sidecar-is
      - SPRING_DATA_REDIS_HOST=kerosene_redis_is_local
      - vault.enabled=true
      - vault.onion.file=/vault-onion/hostname
      - vault.proxy.path=/var/run/tor/socks/tor.sock
    networks: [net_db_is, net_mpc, net_tor]
    depends_on:
      db-is: { condition: service_healthy }
      mpc-sidecar-is: { condition: service_started }

  # ════════════════════════════════════════════════════════════════════════════
