global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: kerosene-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - kerosene-app-is:8080
          - kerosene-app-ch:8080
          - kerosene-app-sg:8080
