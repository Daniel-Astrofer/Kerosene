syntax = "proto3";

package lnrpc;

option java_multiple_files = true;
option java_package = "source.transactions.infra.lnd.proto.lnrpc";

service Lightning {
    rpc WalletBalance (WalletBalanceRequest) returns (WalletBalanceResponse);
    rpc ChannelBalance (ChannelBalanceRequest) returns (ChannelBalanceResponse);
    rpc GetTransactions (GetTransactionsRequest) returns (TransactionDetails);
    rpc SubscribeTransactions (GetTransactionsRequest) returns (stream Transaction);
    rpc GetInfo (GetInfoRequest) returns (GetInfoResponse);
    rpc AddInvoice (Invoice) returns (AddInvoiceResponse);
    rpc LookupInvoice (PaymentHash) returns (Invoice);
    rpc SubscribeInvoices (InvoiceSubscription) returns (stream Invoice);
    rpc SendPaymentSync (SendRequest) returns (SendResponse);
}

message WalletBalanceRequest {
}

message WalletBalanceResponse {
    int64 total_balance = 1;
    int64 confirmed_balance = 2;
    int64 unconfirmed_balance = 3;
}

message Amount {
    uint64 sat = 1;
    uint64 msat = 2;
}

message ChannelBalanceRequest {
}

message ChannelBalanceResponse {
    int64 balance = 1;
    int64 pending_open_balance = 2;
    Amount local_balance = 3;
    Amount remote_balance = 4;
}

enum OutputScriptType {
    SCRIPT_TYPE_PUBKEY_HASH = 0;
    SCRIPT_TYPE_SCRIPT_HASH = 1;
    SCRIPT_TYPE_WITNESS_V0_PUBKEY_HASH = 2;
    SCRIPT_TYPE_WITNESS_V0_SCRIPT_HASH = 3;
    SCRIPT_TYPE_PUBKEY = 4;
    SCRIPT_TYPE_MULTISIG = 5;
    SCRIPT_TYPE_NULLDATA = 6;
    SCRIPT_TYPE_NON_STANDARD = 7;
    SCRIPT_TYPE_WITNESS_UNKNOWN = 8;
    SCRIPT_TYPE_WITNESS_V1_TAPROOT = 9;
}

message OutputDetail {
    OutputScriptType output_type = 1;
    string address = 2;
    string pk_script = 3;
    int64 output_index = 4;
    int64 amount = 5;
    bool is_our_address = 6;
}

message Transaction {
    string tx_hash = 1;
    int64 amount = 2;
    int32 num_confirmations = 3;
    string block_hash = 4;
    int32 block_height = 5;
    int64 time_stamp = 6;
    int64 total_fees = 7;
    string raw_tx_hex = 9;
    string label = 10;
    repeated OutputDetail output_details = 11;
}

message GetTransactionsRequest {
    int32 start_height = 1;
    int32 end_height = 2;
    string account = 3;
    uint32 index_offset = 4;
    uint32 max_transactions = 5;
}

message TransactionDetails {
    repeated Transaction transactions = 1;
    uint64 last_index = 2;
    uint64 first_index = 3;
}

message GetInfoRequest {
}

message GetInfoResponse {
    string identity_pubkey = 1;
    string alias = 2;
    uint32 block_height = 6;
    bool synced_to_chain = 9;
    int64 best_header_timestamp = 13;
    string version = 14;
}

message Invoice {
    string memo = 1;
    bytes r_preimage = 3;
    bytes r_hash = 4;
    int64 value = 5;
    bool settled = 6;
    int64 creation_date = 7;
    int64 settle_date = 8;
    string payment_request = 9;
    int64 expiry = 11;
    uint64 add_index = 16;
    uint64 settle_index = 17;
    int64 amt_paid_sat = 19;
    enum InvoiceState {
        OPEN = 0;
        SETTLED = 1;
        CANCELED = 2;
        ACCEPTED = 3;
    }
    InvoiceState state = 21;
    bytes payment_addr = 26;
}

message AddInvoiceResponse {
    bytes r_hash = 1;
    string payment_request = 2;
    uint64 add_index = 16;
    bytes payment_addr = 17;
}

message PaymentHash {
    string r_hash_str = 1;
    bytes r_hash = 2;
}

message InvoiceSubscription {
    uint64 add_index = 1;
    uint64 settle_index = 2;
}

message FeeLimit {
    oneof limit {
        int64 fixed = 1;
        int64 percent = 2;
        int64 fixed_msat = 3;
    }
}

message SendRequest {
    int64 amt = 3;
    string payment_request = 6;
    FeeLimit fee_limit = 8;
}

message Route {
    int64 total_fees = 2;
    int64 total_fees_msat = 5;
}

message SendResponse {
    string payment_error = 1;
    bytes payment_preimage = 2;
    Route payment_route = 3;
    bytes payment_hash = 4;
}
