syntax = "proto3";

package walletrpc;

option java_multiple_files = true;
option java_package = "source.transactions.infra.lnd.proto.walletrpc";

service WalletKit {
    rpc ListAddresses (ListAddressesRequest) returns (ListAddressesResponse);
    rpc ImportPublicKey (ImportPublicKeyRequest) returns (ImportPublicKeyResponse);
}

enum AddressType {
    UNKNOWN = 0;
    WITNESS_PUBKEY_HASH = 1;
    NESTED_WITNESS_PUBKEY_HASH = 2;
    HYBRID_NESTED_WITNESS_PUBKEY_HASH = 3;
    TAPROOT_PUBKEY = 4;
}

message AddressProperty {
    string address = 1;
    bool is_internal = 2;
    int64 balance = 3;
    string derivation_path = 4;
    bytes public_key = 5;
}

message AccountWithAddresses {
    string name = 1;
    AddressType address_type = 2;
    string derivation_path = 3;
    repeated AddressProperty addresses = 4;
}

message ListAddressesRequest {
    string account_name = 1;
    bool show_custom_accounts = 2;
}

message ListAddressesResponse {
    repeated AccountWithAddresses account_with_addresses = 1;
}

message ImportPublicKeyRequest {
    bytes public_key = 1;
    AddressType address_type = 2;
}

message ImportPublicKeyResponse {
    string status = 1;
}
