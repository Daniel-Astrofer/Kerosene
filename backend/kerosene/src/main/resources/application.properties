spring.application.name=v0.5
#Dados do banco
spring.datasource.url=jdbc:postgresql://localhost:5432/kerosene
spring.datasource.username=${POSTGRES_USER:api_system}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.validate-on-migrate=true
# dialect auto-detected by Hibernate 6; no need to set explicitly

#Redis Server
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000
spring.data.redis.connect-timeout=2s

api.secret.aes.secret=${AES_SECRET:QudiQagMW6PXqZQt2hYj6flPOUs6cGlIIZAwaKkjXwI=}
api.secret.token.secret=${JWT_SECRET:super_secret_jwt_key_that_is_long_enough_for_hs256_123!}
api.secret.pepper.secret=${PASSWORD_PEPPER:dummy_pepper_for_local_dev_123!}

server.address=0.0.0.0
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# WebAuthn (Passkeys) # IMPORTANTE: Essas propriedades precisam espelhar exatamente a URL do Frontend,
# Se nĂŁo o handshake criptografico falharĂˇ por Cross-Origin violation (Biometria recusada).
webauthn.relying-party-id=${WEBAUTHN_RP_ID:kerosene-device}
webauthn.relying-party-name=Kerosene Sovereign
webauthn.origins=${WEBAUTHN_ORIGINS:android:apk-key-hash:kerosene,http://localhost:3000,http://localhost:8080}


# Bitcoin core network / HD derivation
bitcoin.network=${BITCOIN_NETWORK:mainnet}
bitcoin.rpc.enabled=${BITCOIN_RPC_ENABLED:false}
bitcoin.rpc.required=${BITCOIN_RPC_REQUIRED:false}
bitcoin.rpc.pruned-required=${BITCOIN_RPC_PRUNED_REQUIRED:false}
bitcoin.rpc.url=${BITCOIN_RPC_URL:}
bitcoin.rpc.username=${BITCOIN_RPC_USER:}
bitcoin.rpc.password=${BITCOIN_RPC_PASSWORD:}
bitcoin.rpc.wallet=${BITCOIN_RPC_WALLET:}
bitcoin.rpc.zmq.enabled=${BITCOIN_ZMQ_ENABLED:false}
bitcoin.rpc.zmq.rawtx=${BITCOIN_ZMQ_RAWTX:}
bitcoin.rpc.zmq.hashblock=${BITCOIN_ZMQ_HASHBLOCK:}
bitcoin.indexer.base-url=${BITCOIN_INDEXER_BASE_URL:}
bitcoin.esplora.enabled=${BITCOIN_ESPLORA_ENABLED:false}
bitcoin.esplora.base-url=${BITCOIN_INDEXER_BASE_URL:}
bitcoin.fee-recommendation.url=${BITCOIN_FEE_RECOMMENDATION_URL:}
bitcoin.platform.master-xpub=${BITCOIN_PLATFORM_MASTER_XPUB:}
bitcoin.hot-wallet.address=${BITCOIN_HOT_WALLET_ADDRESS:}
bitcoin.hot-wallet.xpub=${BITCOIN_HOT_WALLET_XPUB:}
bitcoin.hot-wallet.xpub-scan-range=${BITCOIN_HOT_WALLET_XPUB_SCAN_RANGE:128}
transactions.local-derived-address-fallback-enabled=${TRANSACTIONS_LOCAL_DERIVED_ADDRESS_FALLBACK_ENABLED:false}
transactions.bitcoin-core-wallet-address-enabled=${TRANSACTIONS_BITCOIN_CORE_WALLET_ADDRESS_ENABLED:false}
kfe.receive.bitcoin-core-wallet-address-enabled=${KFE_RECEIVE_BITCOIN_CORE_WALLET_ADDRESS_ENABLED:${transactions.bitcoin-core-wallet-address-enabled:false}}
app.dev.deposit.instant-credit-enabled=${APP_DEV_DEPOSIT_INSTANT_CREDIT_ENABLED:false}
kfe.network-monitor.enabled=${KFE_NETWORK_MONITOR_ENABLED:false}
kfe.network-monitor.fixed-delay-ms=${KFE_NETWORK_MONITOR_FIXED_DELAY_MS:30000}
kfe.network-monitor.initial-delay-ms=${KFE_NETWORK_MONITOR_INITIAL_DELAY_MS:20000}
kfe.network-monitor.batch-size=${KFE_NETWORK_MONITOR_BATCH_SIZE:50}
kfe.network-monitor.onchain.min-confirmations=${KFE_NETWORK_MONITOR_ONCHAIN_MIN_CONFIRMATIONS:${bitcoin.min-confirmations:3}}
transactions.onchain.test-instant-settlement-enabled=${TRANSACTIONS_ONCHAIN_TEST_INSTANT_SETTLEMENT_ENABLED:false}

bitcoin.min-confirmations=3
bitcoin-accounts.readable-retention-hours=${BITCOIN_ACCOUNTS_READABLE_RETENTION_HOURS:24}
bitcoin-accounts.retention.fixed-delay-ms=${BITCOIN_ACCOUNTS_RETENTION_FIXED_DELAY_MS:3600000}
bitcoin-accounts.receive-monitor.fixed-delay-ms=${BITCOIN_ACCOUNTS_RECEIVE_MONITOR_FIXED_DELAY_MS:30000}
bitcoin-accounts.cold-wallet-monitor.fixed-delay-ms=${BITCOIN_ACCOUNTS_COLD_WALLET_MONITOR_FIXED_DELAY_MS:60000}
bitcoin-accounts.psbt.workflow-ttl-hours=${BITCOIN_ACCOUNTS_PSBT_WORKFLOW_TTL_HOURS:24}
bitcoin-accounts.psbt.expiry-fixed-delay-ms=${BITCOIN_ACCOUNTS_PSBT_EXPIRY_FIXED_DELAY_MS:300000}
bitcoin-accounts.psbt.fee-safety-buffer-sats=${BITCOIN_ACCOUNTS_PSBT_FEE_SAFETY_BUFFER_SATS:5000}
bitcoin-accounts.psbt.fee-safety-multiplier=${BITCOIN_ACCOUNTS_PSBT_FEE_SAFETY_MULTIPLIER:2}
ledger.history.retention.hours=${LEDGER_HISTORY_RETENTION_HOURS:24}

bitcoin.mock-mode=false
voucher.mock.accept-any-txid=${VOUCHER_MOCK_ACCEPT_ANY_TXID:false}

# Vault/HSM and MPC sidecar. Production profile refuses to boot unless Vault
# and mTLS are enabled.
vault.enabled=${VAULT_ENABLED:false}
vault.bootstrap.startup-timeout-ms=${VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS:180000}
vault.request-timeout-ms=${VAULT_REQUEST_TIMEOUT_MS:75000}
vault.raft.enabled=${VAULT_RAFT_ENABLED:false}
vault.raft.required=${VAULT_RAFT_REQUIRED:false}
vault.raft.url=${VAULT_RAFT_URL:https://vault-raft-1:8200}
vault.raft.token=${VAULT_RAFT_TOKEN:}
vault.raft.token-file=${VAULT_RAFT_TOKEN_FILE:}
vault.raft.expected-servers=${VAULT_RAFT_EXPECTED_SERVERS:3}
vault.raft.tls-insecure=${VAULT_RAFT_TLS_INSECURE:false}
shard.attestation.secret=${SHARD_ATTESTATION_SECRET:}
mpc.sidecar.host=${MPC_SIDECAR_HOST:localhost}
mpc.sidecar.port=${MPC_SIDECAR_PORT:50051}
mpc.sidecar.tls.enabled=${MPC_SIDECAR_TLS_ENABLED:false}
mpc.sidecar.tls.cert-chain=${MPC_SIDECAR_TLS_CERT_CHAIN:}
mpc.sidecar.tls.private-key=${MPC_SIDECAR_TLS_PRIVATE_KEY:}
mpc.sidecar.tls.trust-cert-collection=${MPC_SIDECAR_TLS_CA:}
mpc.sidecar.request-timeout-ms=${MPC_SIDECAR_REQUEST_TIMEOUT_MS:5000}
quorum.allow-local-simulation=${QUORUM_ALLOW_LOCAL_SIMULATION:false}
lightning.lnd.enabled=${LIGHTNING_LND_ENABLED:false}
lightning.lnd.host=${LIGHTNING_LND_HOST:}
lightning.lnd.port=${LIGHTNING_LND_PORT:10009}
lightning.lnd.tls.enabled=${LIGHTNING_LND_TLS_ENABLED:true}
lightning.lnd.tls.cert-path=${LIGHTNING_LND_TLS_CERT_PATH:}
lightning.lnd.macaroon=${LIGHTNING_LND_MACAROON:}
lightning.lnd.macaroon-path=${LIGHTNING_LND_MACAROON_PATH:}
lightning.lnd.payment-timeout-seconds=${LIGHTNING_LND_PAYMENT_TIMEOUT_SECONDS:30}
lightning.lnd.provider-name=${LIGHTNING_LND_PROVIDER_NAME:LND_BITCOIND_PRUNED}
transactions.rails.lightning.invoice-provider=${TRANSACTIONS_LIGHTNING_INVOICE_PROVIDER:auto}
transactions.rails.lightning.payment-provider=${TRANSACTIONS_LIGHTNING_PAYMENT_PROVIDER:auto}
transactions.onchain.max-network-fee-btc=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_BTC:0.00100000}
transactions.onchain.max-network-fee-percent=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_PERCENT:0.1000}
quorum.psbt.required-signatures=${QUORUM_PSBT_REQUIRED_SIGNATURES:2}
quorum.psbt.funding-confirmation-target=${QUORUM_PSBT_FUNDING_CONFIRMATION_TARGET:6}
quorum.psbt.signer-urls=${QUORUM_PSBT_SIGNER_URLS:}
quorum.psbt.signer-api-keys=${QUORUM_PSBT_SIGNER_API_KEYS:}
quorum.psbt.signer-ids=${QUORUM_PSBT_SIGNER_IDS:}
quorum.psbt.require-signer-identity=${QUORUM_PSBT_REQUIRE_SIGNER_IDENTITY:true}

# Logging levels (reduced noise)
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN
spring.threads.virtual.enabled=true
security.constant-time-padding.enabled=false
security.constant-time-padding.target-ms=250
security.app-pin.min-length=4
security.app-pin.max-length=8
security.app-pin.max-attempts=5
security.app-pin.lockout-minutes=5
wallet.card.validity-months=24
wallet.card.expiring-soon-days=14

# Actuator / Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.redis.enabled=true
management.health.db.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,redis,tor
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.region=${REGION:DEV}
management.prometheus.metrics.export.enabled=true
tor.health.required=${TOR_HEALTH_REQUIRED:false}
operational.health.external-checks.enabled=${OPERATIONAL_HEALTH_EXTERNAL_CHECKS_ENABLED:false}
operational.health.mempool-url=${OPERATIONAL_HEALTH_MEMPOOL_URL:}

# Release snapshot and internal attestation
release.service-name=${RELEASE_SERVICE_NAME:${spring.application.name}}
release.git-commit=${GIT_COMMIT:unknown}
release.build-time=${BUILD_TIME:unknown}
release.image-digest=${IMAGE_DIGEST:unknown}
release.code-hash=${CODE_HASH:unknown}
release.config-hash=${CONFIG_HASH:unknown}
release.manifest.path=${RELEASE_MANIFEST_PATH:}
release.manifest.signature-path=${RELEASE_MANIFEST_SIGNATURE_PATH:}
release.manifest.public-key-path=${RELEASE_MANIFEST_PUBLIC_KEY_PATH:}
release.attestation.required=${RELEASE_ATTESTATION_REQUIRED:false}
release.attestation.remote.enabled=${RELEASE_REMOTE_ATTESTATION_ENABLED:false}
release.attestation.shared-secret=${RELEASE_ATTESTATION_SECRET:}
release.attestation.require-client-certificate=${RELEASE_REQUIRE_CLIENT_CERTIFICATE:false}
release.attestation.client-certificate-subject=${RELEASE_CLIENT_CERTIFICATE_SUBJECT:}
release.attestation.critical-path-prefixes=${RELEASE_CRITICAL_PATH_PREFIXES:/internal,/sovereignty/heartbeat,/v1/audit/siphon}

mobile.release.version=${MOBILE_RELEASE_VERSION:1.0.0}
mobile.release.build-number=${MOBILE_RELEASE_BUILD_NUMBER:1}
mobile.release.android-url=${MOBILE_ANDROID_URL:}
mobile.release.ios-url=${MOBILE_IOS_URL:}
mobile.release.android-sha256=${MOBILE_ANDROID_SHA256:80158a61b982eb4db95cd010d63ca3d5b52d3e2215c8d9df046a6609db960582}
mobile.release.ios-sha256=${MOBILE_IOS_SHA256:}
mobile.release.signing-certificate-sha256=${MOBILE_SIGNING_CERT_SHA256:}
mobile.release.changelog=${MOBILE_CHANGELOG:Initial Android release with secure wallet, passkeys, payment links, and web admin integration.}

# Blind filters hardening
server.server-header=
spring.servlet.multipart.max-file-size=2KB
spring.servlet.multipart.max-request-size=2KB
server.tomcat.max-http-form-post-size=2048
