spring.application.name=v0.5
#Dados do banco
spring.datasource.url=jdbc:postgresql://localhost:5432/kerosene
spring.datasource.username=${POSTGRES_USER:api_system}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# dialect auto-detected by Hibernate 6 — no need to set explicitly

#Redis Server
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

api.secret.aes.secret=${AES_SECRET}
api.secret.token.secret=${JWT_SECRET}

server.address=0.0.0.0

# Alchemy Bitcoin Configuration (JSON-RPC)
alchemy.api-key=${API_KEY}
alchemy.bitcoin.url=https://btc-mainnet.g.alchemy.com/v2/


# Bitcoin Deposit Configuration
# Seu endereço Bitcoin onde os usuários enviarão depósitos
bitcoin.deposit-address=1A1z7agoat7F9gq5TFGakzrx6R5vbR2rAP


bitcoin.min-confirmations=3

# Tempo de expiração do payment link em minutos
bitcoin.payment-link-expiration-minutes=60

bitcoin.mock-mode=false

# Logging levels (reduced noise)
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN
spring.threads.virtual.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
