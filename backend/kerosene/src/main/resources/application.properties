spring.application.name=v0.5
#Dados do banco
spring.datasource.url=jdbc:postgresql://localhost:5432/kerosene
spring.datasource.username=${POSTGRES_USER:api_system}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
# dialect auto-detected by Hibernate 6; no need to set explicitly

#Redis Server
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

api.secret.aes.secret=${AES_SECRET}
api.secret.token.secret=${JWT_SECRET}
api.secret.pepper.secret=${PASSWORD_PEPPER}

server.address=0.0.0.0
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# WebAuthn (Passkeys) # IMPORTANTE: Essas propriedades precisam espelhar exatamente a URL do Frontend,
# Se não o handshake criptografico falhará por Cross-Origin violation (Biometria recusada).
webauthn.relying-party-id=${WEBAUTHN_RP_ID:localhost}
webauthn.relying-party-name=Kerosene Sovereign
webauthn.origins=${WEBAUTHN_ORIGINS:android:apk-key-hash:kerosene,http://localhost:3000,http://localhost:8080}


# Bitcoin data provider (Esplora / no API key required)
bitcoin.esplora.base-url=${BITCOIN_ESPLORA_BASE_URL:}
bitcoin.platform.master-xpub=${BITCOIN_PLATFORM_MASTER_XPUB:}
bitcoin.hot-wallet.address=${BITCOIN_HOT_WALLET_ADDRESS:}
bitcoin.hot-wallet.xpub=${BITCOIN_HOT_WALLET_XPUB:}
bitcoin.hot-wallet.xpub-scan-range=${BITCOIN_HOT_WALLET_XPUB_SCAN_RANGE:128}


# Bitcoin Deposit Configuration
# Seu endereco Bitcoin onde os usuarios enviarao depositos
bitcoin.deposit-address=1A1z7agoat7F9gq5TFGakzrx6R5vbR2rAP


bitcoin.min-confirmations=3

# Tempo de expiracao do payment link em minutos
bitcoin.payment-link-expiration-minutes=60

bitcoin.mock-mode=false
voucher.mock.accept-any-txid=${VOUCHER_MOCK_ACCEPT_ANY_TXID:false}

# Vault/HSM and MPC sidecar. Production profile refuses to boot unless Vault
# and mTLS are enabled.
vault.enabled=${VAULT_ENABLED:false}
vault.request-timeout-ms=${VAULT_REQUEST_TIMEOUT_MS:75000}
mpc.sidecar.host=${MPC_SIDECAR_HOST:localhost}
mpc.sidecar.port=${MPC_SIDECAR_PORT:50051}
mpc.sidecar.tls.enabled=${MPC_SIDECAR_TLS_ENABLED:true}
mpc.sidecar.tls.cert-chain=${MPC_SIDECAR_TLS_CERT_CHAIN:}
mpc.sidecar.tls.private-key=${MPC_SIDECAR_TLS_PRIVATE_KEY:}
mpc.sidecar.tls.trust-cert-collection=${MPC_SIDECAR_TLS_CA:}
quorum.allow-local-simulation=false
custody.mock-mode=${CUSTODY_MOCK_MODE:false}
custody.base-url=${CUSTODY_BASE_URL:}
custody.api-key=${CUSTODY_API_KEY:}
lightning.provider.base-url=${LIGHTNING_PROVIDER_BASE_URL:}
lightning.provider.api-key=${LIGHTNING_PROVIDER_API_KEY:}

# Logging levels (reduced noise)
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN
spring.threads.virtual.enabled=true
security.constant-time-padding.enabled=false
security.constant-time-padding.target-ms=250

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Blind filters hardening
server.server-header=
spring.servlet.multipart.max-file-size=2KB
spring.servlet.multipart.max-request-size=2KB
server.tomcat.max-http-form-post-size=2048
