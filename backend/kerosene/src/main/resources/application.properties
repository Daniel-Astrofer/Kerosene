spring.application.name=v0.5
#Dados do banco
spring.datasource.url=jdbc:postgresql://localhost:5432/kerosene
spring.datasource.username=${POSTGRES_USER:api_system}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# dialect auto-detected by Hibernate 6 вЂ” no need to set explicitly

#Redis Server
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

api.secret.aes.secret=${AES_SECRET}
api.secret.token.secret=${JWT_SECRET}
api.secret.pepper.secret=${PASSWORD_PEPPER}

server.address=0.0.0.0

# WebAuthn (Passkeys) # IMPORTANTE: Essas propriedades precisam espelhar exatamente a URL do Frontend,
# Se nгo o handshake criptografico falharб por Cross-Origin violation (Biometria recusada).
webauthn.relying-party-id=${WEBAUTHN_RP_ID:localhost}
webauthn.relying-party-name=Kerosene Sovereign
webauthn.origins=${WEBAUTHN_ORIGINS:http://localhost:3000,http://localhost:8080}


# Pocket Network Bitcoin Configuration (JSON-RPC)
pocket.api-key=${API_KEY}
pocket.bitcoin.url=https://bitcoin-mainnet.gateway.pokt.network/v1/lb/


# Bitcoin Deposit Configuration
# Seu endereГ§o Bitcoin onde os usuГЎrios enviarГЈo depГіsitos
bitcoin.deposit-address=1A1z7agoat7F9gq5TFGakzrx6R5vbR2rAP


bitcoin.min-confirmations=3

# Tempo de expiraГ§ГЈo do payment link em minutos
bitcoin.payment-link-expiration-minutes=60

bitcoin.mock-mode=false

# Logging levels (reduced noise)
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.socket=WARN
spring.threads.virtual.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# в”Ђв”Ђв”Ђ Manto de SilГЄncio e Blind Filters в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
server.server-header=
spring.servlet.multipart.max-file-size=2KB
spring.servlet.multipart.max-request-size=2KB
server.tomcat.max-http-form-post-size=2048
