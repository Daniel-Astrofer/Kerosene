# Production never lets Hibernate or SQL init mutate schema implicitly.
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

# Production endpoints and browser/passkey origins must be explicit.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
webauthn.relying-party-id=${WEBAUTHN_RP_ID}
webauthn.rp.id=${WEBAUTHN_RP_ID}
webauthn.origins=${WEBAUTHN_ORIGINS}

# Financial rails must fail closed in prod.
bitcoin.network=${BITCOIN_NETWORK:mainnet}
bitcoin.mock-mode=false
bitcoin.rpc.enabled=${BITCOIN_RPC_ENABLED:true}
bitcoin.rpc.required=${BITCOIN_RPC_REQUIRED:true}
bitcoin.rpc.pruned-required=${BITCOIN_RPC_PRUNED_REQUIRED:true}
bitcoin.rpc.url=${BITCOIN_RPC_URL}
bitcoin.rpc.username=${BITCOIN_RPC_USER}
bitcoin.rpc.password=${BITCOIN_RPC_PASSWORD}
bitcoin.rpc.wallet=${BITCOIN_RPC_WALLET}
bitcoin.rpc.zmq.enabled=${BITCOIN_ZMQ_ENABLED:true}
bitcoin.rpc.zmq.rawtx=${BITCOIN_ZMQ_RAWTX}
bitcoin.rpc.zmq.hashblock=${BITCOIN_ZMQ_HASHBLOCK}
bitcoin.platform.master-xpub=${BITCOIN_PLATFORM_MASTER_XPUB}
transactions.local-derived-address-fallback-enabled=false
transactions.bitcoin-core-wallet-address-enabled=${TRANSACTIONS_BITCOIN_CORE_WALLET_ADDRESS_ENABLED:true}
voucher.mock.accept-any-txid=false
custody.mock-mode=false
treasury.siphon.manual-settlement-enabled=false

# Vault, shard quorum, and MPC signing are mandatory.
vault.enabled=${VAULT_ENABLED:true}
vault.raft.enabled=${VAULT_RAFT_ENABLED:true}
vault.raft.required=${VAULT_RAFT_REQUIRED:true}
vault.raft.url=${VAULT_RAFT_URL}
vault.raft.expected-servers=${VAULT_RAFT_EXPECTED_SERVERS:3}
shard.attestation.secret=${SHARD_ATTESTATION_SECRET}
quorum.allow-local-simulation=false
quorum.shard.urls=${QUORUM_SHARD_URLS}
mpc.sidecar.host=${MPC_SIDECAR_HOST}
mpc.sidecar.tls.enabled=true
mpc.sidecar.tls.cert-chain=${MPC_SIDECAR_TLS_CERT_CHAIN}
mpc.sidecar.tls.private-key=${MPC_SIDECAR_TLS_PRIVATE_KEY}
mpc.sidecar.tls.trust-cert-collection=${MPC_SIDECAR_TLS_CA}

# Lightning receive/send capability is required for production rails.
lightning.lnd.enabled=${LIGHTNING_LND_ENABLED:true}
lightning.lnd.host=${LIGHTNING_LND_HOST}
lightning.lnd.tls.enabled=true
lightning.lnd.tls.cert-path=${LIGHTNING_LND_TLS_CERT_PATH}
lightning.lnd.macaroon=${LIGHTNING_LND_MACAROON:}
lightning.lnd.macaroon-path=${LIGHTNING_LND_MACAROON_PATH}
lightning.lnd.provider-name=${LIGHTNING_LND_PROVIDER_NAME:LND_BITCOIND_PRUNED}
transactions.rails.lightning.invoice-provider=${TRANSACTIONS_LIGHTNING_INVOICE_PROVIDER:lnd}
transactions.rails.lightning.payment-provider=${TRANSACTIONS_LIGHTNING_PAYMENT_PROVIDER:lnd}
transactions.onchain.max-network-fee-btc=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_BTC:0.00100000}
transactions.onchain.max-network-fee-percent=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_PERCENT:0.1000}
quorum.psbt.signer-urls=${QUORUM_PSBT_SIGNER_URLS}
quorum.psbt.signer-ids=${QUORUM_PSBT_SIGNER_IDS}
quorum.psbt.require-signer-identity=${QUORUM_PSBT_REQUIRE_SIGNER_IDENTITY:true}

# Operational hardening.
security.constant-time-padding.enabled=true
management.endpoint.health.show-details=never
tor.health.required=true
operational.health.external-checks.enabled=${OPERATIONAL_HEALTH_EXTERNAL_CHECKS_ENABLED:true}
release.attestation.required=${RELEASE_ATTESTATION_REQUIRED:true}
release.attestation.remote.enabled=${RELEASE_REMOTE_ATTESTATION_ENABLED:true}
release.attestation.shared-secret=${RELEASE_ATTESTATION_SECRET}
