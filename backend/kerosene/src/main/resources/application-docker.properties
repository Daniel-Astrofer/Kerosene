# ─────────────────────────────────────────────────────────────────────────────
# Spring Boot — Docker Profile
# Applied when SPRING_PROFILES_ACTIVE=docker (set in docker-compose.yml)
# Overrides application.properties with values safe for containerized operation.
# ─────────────────────────────────────────────────────────────────────────────

# Bind ONLY to loopback — the JVM socket is unreachable from outside the
# container. All inbound traffic flows through the Tor hidden service.
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=FRAMEWORK

# PostgreSQL — resolves to the 'db' service via Docker DNS
spring.datasource.url=jdbc:postgresql://db:5432/kerosene
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate schema only; production changes must be applied explicitly before boot.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# SQL schema bootstrap is disabled; Flyway owns schema changes before Hibernate validation.
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.validate-on-migrate=true

# Redis — resolves to the 'redis' service via Docker DNS
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000
spring.data.redis.connect-timeout=2s

# Reduce logging noise in production
logging.level.root=WARN
logging.level.source=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.health.redis.enabled=true
management.health.db.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,redis,tor
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.region=${REGION:DEV}
management.prometheus.metrics.export.enabled=true
tor.health.required=${TOR_HEALTH_REQUIRED:true}
operational.health.external-checks.enabled=${OPERATIONAL_HEALTH_EXTERNAL_CHECKS_ENABLED:false}
operational.health.mempool-url=${OPERATIONAL_HEALTH_MEMPOOL_URL:}
bitcoin.rpc.enabled=${BITCOIN_RPC_ENABLED:true}
bitcoin.rpc.required=${BITCOIN_RPC_REQUIRED:true}
bitcoin.rpc.pruned-required=${BITCOIN_RPC_PRUNED_REQUIRED:true}
bitcoin.rpc.url=${BITCOIN_RPC_URL:http://bitcoin-pruned-node:8332}
bitcoin.rpc.username=${BITCOIN_RPC_USER:kerosene}
bitcoin.rpc.password=${BITCOIN_RPC_PASSWORD}
bitcoin.rpc.wallet=${BITCOIN_RPC_WALLET:kerosene}
bitcoin.rpc.zmq.enabled=${BITCOIN_ZMQ_ENABLED:true}
bitcoin.rpc.zmq.rawtx=${BITCOIN_ZMQ_RAWTX:tcp://bitcoin-pruned-node:28332}
bitcoin.rpc.zmq.hashblock=${BITCOIN_ZMQ_HASHBLOCK:tcp://bitcoin-pruned-node:28333}
bitcoin.indexer.base-url=${BITCOIN_INDEXER_BASE_URL:}
bitcoin.esplora.enabled=${BITCOIN_ESPLORA_ENABLED:false}
bitcoin.esplora.base-url=${BITCOIN_INDEXER_BASE_URL:}
bitcoin.fee-recommendation.url=${BITCOIN_FEE_RECOMMENDATION_URL:}
vault.raft.enabled=${VAULT_RAFT_ENABLED:true}
vault.raft.required=${VAULT_RAFT_REQUIRED:true}
vault.raft.url=${VAULT_RAFT_URL:https://vault-raft-1:8200}
vault.raft.token=${VAULT_RAFT_TOKEN:}
vault.raft.token-file=${VAULT_RAFT_TOKEN_FILE:/vault-raft/app-health-token}
vault.raft.expected-servers=${VAULT_RAFT_EXPECTED_SERVERS:3}
vault.raft.tls-insecure=${VAULT_RAFT_TLS_INSECURE:false}

# Merkle Audit Scheduler — interval in milliseconds (default: 5 minutes)
audit.merkle.interval-ms=300000

# Local Docker runs as distroless UID 65532; named volumes mount root-owned by default.
# Use /tmp tmpfs unless SHARD_IDENTITY_PATH points to a UID 65532-writable mount.
shard.identity.path=${SHARD_IDENTITY_PATH:/tmp/kerosene-identity}

# Local Docker shard containers do not have direct internet egress.
ticker.coingecko.enabled=false
security.time-drift.https-oracles.enabled=false
vault.request-timeout-ms=${VAULT_REQUEST_TIMEOUT_MS:75000}
bitcoin.mock-mode=false
quorum.allow-local-simulation=${QUORUM_ALLOW_LOCAL_SIMULATION:true}
transactions.external.fee-rate=0.009
transactions.local-address-provider-name=BITCOIN_CORE_WALLET
transactions.bitcoin-core-wallet-address-enabled=${TRANSACTIONS_BITCOIN_CORE_WALLET_ADDRESS_ENABLED:true}
kfe.receive.bitcoin-core-wallet-address-enabled=${KFE_RECEIVE_BITCOIN_CORE_WALLET_ADDRESS_ENABLED:${transactions.bitcoin-core-wallet-address-enabled:true}}
kfe.network-monitor.enabled=${KFE_NETWORK_MONITOR_ENABLED:true}
kfe.network-monitor.fixed-delay-ms=${KFE_NETWORK_MONITOR_FIXED_DELAY_MS:30000}
kfe.network-monitor.initial-delay-ms=${KFE_NETWORK_MONITOR_INITIAL_DELAY_MS:20000}
kfe.network-monitor.batch-size=${KFE_NETWORK_MONITOR_BATCH_SIZE:50}
kfe.network-monitor.onchain.min-confirmations=${KFE_NETWORK_MONITOR_ONCHAIN_MIN_CONFIRMATIONS:${bitcoin.min-confirmations:3}}
lightning.default-max-routing-fee-sats=60
lightning.lnd.enabled=${LIGHTNING_LND_ENABLED:true}
lightning.lnd.host=${LIGHTNING_LND_HOST:lnd-bitcoind}
lightning.lnd.port=${LIGHTNING_LND_PORT:10009}
lightning.lnd.tls.enabled=${LIGHTNING_LND_TLS_ENABLED:true}
lightning.lnd.tls.cert-path=${LIGHTNING_LND_TLS_CERT_PATH:/lnd/tls.cert}
lightning.lnd.macaroon=${LIGHTNING_LND_MACAROON:}
lightning.lnd.macaroon-path=${LIGHTNING_LND_MACAROON_PATH:/lnd/data/chain/bitcoin/${BITCOIN_NETWORK:mainnet}/admin.macaroon}
lightning.lnd.payment-timeout-seconds=${LIGHTNING_LND_PAYMENT_TIMEOUT_SECONDS:30}
lightning.lnd.provider-name=${LIGHTNING_LND_PROVIDER_NAME:LND_BITCOIND_PRUNED}
transactions.rails.lightning.invoice-provider=${TRANSACTIONS_LIGHTNING_INVOICE_PROVIDER:auto}
transactions.rails.lightning.payment-provider=${TRANSACTIONS_LIGHTNING_PAYMENT_PROVIDER:auto}
transactions.onchain.max-network-fee-btc=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_BTC:0.00100000}
transactions.onchain.max-network-fee-percent=${TRANSACTIONS_ONCHAIN_MAX_NETWORK_FEE_PERCENT:0.1000}
quorum.psbt.signer-ids=${QUORUM_PSBT_SIGNER_IDS:signer-1,signer-2}
quorum.psbt.require-signer-identity=${QUORUM_PSBT_REQUIRE_SIGNER_IDENTITY:true}
quorum.psbt.required-signatures=${QUORUM_PSBT_REQUIRED_SIGNATURES:2}
quorum.psbt.funding-confirmation-target=${QUORUM_PSBT_FUNDING_CONFIRMATION_TARGET:6}
quorum.psbt.signer-urls=${QUORUM_PSBT_SIGNER_URLS:}
quorum.psbt.signer-api-keys=${QUORUM_PSBT_SIGNER_API_KEYS:}
onramp.moonpay.api-key=${ONRAMP_MOONPAY_API_KEY:}
onramp.moonpay.secret-key=${ONRAMP_MOONPAY_SECRET_KEY:}
onramp.moonpay.base-currency-code=${ONRAMP_MOONPAY_BASE_CURRENCY_CODE:btc}
onramp.banxa.fiat-type=${ONRAMP_BANXA_FIAT_TYPE:USD}
transactions.inbound-monitor.fixed-delay-ms=${TRANSACTIONS_INBOUND_MONITOR_FIXED_DELAY_MS:30000}
transactions.inbound-monitor.batch-size=${TRANSACTIONS_INBOUND_MONITOR_BATCH_SIZE:200}
transactions.onchain.test-instant-settlement-enabled=${TRANSACTIONS_ONCHAIN_TEST_INSTANT_SETTLEMENT_ENABLED:false}
sovereignty.heartbeat.initial-grace-ms=15000
sovereignty.heartbeat.request-timeout-ms=5000
sovereignty.heartbeat.retry-attempts=2
sovereignty.heartbeat.retry-backoff-ms=250
sovereignty.heartbeat.warn-after-consecutive-failures=3
security.constant-time-padding.enabled=false
security.constant-time-padding.target-ms=250
voucher.mock.accept-any-txid=${VOUCHER_MOCK_ACCEPT_ANY_TXID:false}
financial.audit.wallet-xpub-gap-limit=20
financial.audit.treasury-xpub-scan-range=128
ledger.history.retention.hours=${LEDGER_HISTORY_RETENTION_HOURS:24}

# ─── HikariCP Connection Pool (Issue 2.7) ────────────────────────────────────
# Default Spring Boot pool size is 10 — too low for concurrent transaction load.
# With 3 shards and concurrent requests, 50 max connections is more appropriate.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Warn if a connection is held longer than 60s (likely a slow query or bug)
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=KerosenePgPool

# ─── Blockchain Monitor Adaptive Interval (Issue 2.3) ────────────────────────
blockchain.monitor.interval.min=10000
blockchain.monitor.interval.max=120000

# ─── WebAuthn Relying Party ───────────────────────────────────────────────────
# The app passkey is an Ed25519 device key, not browser WebAuthn.
# Keep the RP ID stable so local credentials survive localhost/onion changes.
webauthn.rp.id=${WEBAUTHN_RP_ID:kerosene-device}
webauthn.relying-party-id=${WEBAUTHN_RP_ID:kerosene-device}
webauthn.rp.name=${WEBAUTHN_RP_NAME:Kerosene}
webauthn.origins=${WEBAUTHN_ORIGINS:android:apk-key-hash:kerosene,http://localhost:3000,http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
vault.proxy.path=/var/run/tor/socks/tor.sock
