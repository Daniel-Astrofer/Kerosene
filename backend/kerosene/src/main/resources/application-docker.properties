# ─────────────────────────────────────────────────────────────────────────────
# Spring Boot — Docker Profile
# Applied when SPRING_PROFILES_ACTIVE=docker (set in docker-compose.yml)
# Overrides application.properties with values safe for containerized operation.
# ─────────────────────────────────────────────────────────────────────────────

# Bind ONLY to loopback — the JVM socket is unreachable from outside the
# container. All inbound traffic flows through the Tor hidden service.
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=FRAMEWORK

# PostgreSQL — resolves to the 'db' service via Docker DNS
spring.datasource.url=jdbc:postgresql://db:5432/kerosene
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate schema only; production changes must be applied explicitly before boot.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# SQL schema bootstrap is disabled in production. Apply db/migration.sql out-of-band.
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=false

# Redis — resolves to the 'redis' service via Docker DNS
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000

# Reduce logging noise in production
logging.level.root=WARN
logging.level.source=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=DEBUG

# Merkle Audit Scheduler — interval in milliseconds (default: 5 minutes)
audit.merkle.interval-ms=300000

# Local Docker runs as distroless UID 65532; named volumes mount root-owned by default.
# Use /tmp tmpfs unless SHARD_IDENTITY_PATH points to a UID 65532-writable mount.
shard.identity.path=${SHARD_IDENTITY_PATH:/tmp/kerosene-identity}

# Local Docker shard containers do not have direct internet egress.
ticker.coingecko.enabled=false
security.time-drift.https-oracles.enabled=false
vault.request-timeout-ms=${VAULT_REQUEST_TIMEOUT_MS:75000}
bitcoin.mock-mode=false
transactions.external.fee-rate=0.009
transactions.local-address-provider-name=LND_NEUTRINO
lightning.default-max-routing-fee-sats=60
lightning.lnd.enabled=${LIGHTNING_LND_ENABLED:false}
lightning.lnd.host=${LIGHTNING_LND_HOST:lnd-neutrino}
lightning.lnd.port=${LIGHTNING_LND_PORT:10009}
lightning.lnd.tls.enabled=${LIGHTNING_LND_TLS_ENABLED:true}
lightning.lnd.tls.cert-path=${LIGHTNING_LND_TLS_CERT_PATH:/lnd/tls.cert}
lightning.lnd.macaroon=${LIGHTNING_LND_MACAROON:}
lightning.lnd.macaroon-path=${LIGHTNING_LND_MACAROON_PATH:/lnd/data/chain/bitcoin/${BITCOIN_NETWORK:testnet}/admin.macaroon}
lightning.lnd.payment-timeout-seconds=${LIGHTNING_LND_PAYMENT_TIMEOUT_SECONDS:30}
lightning.lnd.provider-name=${LIGHTNING_LND_PROVIDER_NAME:LND_NEUTRINO}
quorum.psbt.required-signatures=${QUORUM_PSBT_REQUIRED_SIGNATURES:2}
quorum.psbt.funding-confirmation-target=${QUORUM_PSBT_FUNDING_CONFIRMATION_TARGET:6}
quorum.psbt.signer-urls=${QUORUM_PSBT_SIGNER_URLS:}
quorum.psbt.signer-api-keys=${QUORUM_PSBT_SIGNER_API_KEYS:}
onramp.moonpay.api-key=${ONRAMP_MOONPAY_API_KEY:}
onramp.moonpay.secret-key=${ONRAMP_MOONPAY_SECRET_KEY:}
onramp.moonpay.base-currency-code=${ONRAMP_MOONPAY_BASE_CURRENCY_CODE:btc}
onramp.banxa.fiat-type=${ONRAMP_BANXA_FIAT_TYPE:USD}
transactions.inbound-monitor.fixed-delay-ms=${TRANSACTIONS_INBOUND_MONITOR_FIXED_DELAY_MS:30000}
transactions.inbound-monitor.batch-size=${TRANSACTIONS_INBOUND_MONITOR_BATCH_SIZE:200}
sovereignty.heartbeat.initial-grace-ms=15000
sovereignty.heartbeat.request-timeout-ms=5000
sovereignty.heartbeat.retry-attempts=2
sovereignty.heartbeat.retry-backoff-ms=250
sovereignty.heartbeat.warn-after-consecutive-failures=3
security.constant-time-padding.enabled=false
security.constant-time-padding.target-ms=250
voucher.mock.accept-any-txid=${VOUCHER_MOCK_ACCEPT_ANY_TXID:false}
financial.audit.wallet-xpub-gap-limit=20
financial.audit.treasury-xpub-scan-range=128

# ─── HikariCP Connection Pool (Issue 2.7) ────────────────────────────────────
# Default Spring Boot pool size is 10 — too low for concurrent transaction load.
# With 3 shards and concurrent requests, 50 max connections is more appropriate.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Warn if a connection is held longer than 60s (likely a slow query or bug)
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=KerosenePgPool

# ─── Blockchain Monitor Adaptive Interval (Issue 2.3) ────────────────────────
blockchain.monitor.interval.min=10000
blockchain.monitor.interval.max=120000

# ─── WebAuthn Relying Party ───────────────────────────────────────────────────
# rpId must match the host/domain the browser sees (without the http:// scheme).
# For Tor onion services, this will be the .onion hostname.
# Override via environment variable WEBAUTHN_RP_ID in docker-compose.yml.
webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
webauthn.relying-party-id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp.name=${WEBAUTHN_RP_NAME:Kerosene}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
