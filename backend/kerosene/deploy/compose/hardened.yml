services:
  # ══════════════════════════════════════════════════════════════════
  # KEROSENE SECURE VAULT (Central Hardware Attestation Node)
  # ══════════════════════════════════════════════════════════════════
  kerosene-vault:
    build:
      context: ../../../vault
      dockerfile: Dockerfile
    container_name: kerosene-vault
    restart: unless-stopped
    # ⚠️ No 'ports:' mapping — Vault is ONLY reachable via kerosene-tor-vault on
    # the net_vault network. Exposing any TCP port would deanonymize the real IP.
    environment:
      - FOUNDER_TOTP_SECRET=${FOUNDER_TOTP_SECRET:?FOUNDER_TOTP_SECRET is required}
      - VAULT_DIRECTOR_HMAC_SECRETS=${VAULT_DIRECTOR_HMAC_SECRETS:?VAULT_DIRECTOR_HMAC_SECRETS is required}
      - VAULT_REQUIRED_APPROVALS=${VAULT_REQUIRED_APPROVALS:-2}
      - VAULT_CLUSTER_ATTESTATION_SECRET=${VAULT_CLUSTER_ATTESTATION_SECRET:?VAULT_CLUSTER_ATTESTATION_SECRET is required}
    networks:
      net_vault:
        ipv4_address: 10.240.0.10
    mem_limit: 512m
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
    ulimits:
      memlock:
        soft: -1
        hard: -1

  kerosene-tor-vault:
    image: debian:bookworm-slim
    container_name: kerosene-tor-vault
    restart: unless-stopped
    volumes:
      - ../tor/torrc-vault-main:/etc/tor/torrc:ro
      - ../tor/entrypoint.sh:/entrypoint.sh:ro
      - tor_keys_vault:/var/lib/tor/kerosene_service
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_vault, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on: [kerosene-vault]

  kerosene-vault-arm:
    image: curlimages/curl:8.10.1
    container_name: kerosene-vault-arm
    restart: "no"
    env_file: ../../.env
    environment:
      - VAULT_URL=http://kerosene-vault:8090/v1/vault/arm
      - VAULT_ARM_MAX_WAIT_SECONDS=120
      - VAULT_ARM_DIRECTORS=${VAULT_ARM_DIRECTORS:-director-1,director-2}
      - VAULT_DIRECTOR_HMAC_SECRETS=${VAULT_DIRECTOR_HMAC_SECRETS:?VAULT_DIRECTOR_HMAC_SECRETS is required}
      - DIRECTOR_1_ARM_SIGNATURE=${DIRECTOR_1_ARM_SIGNATURE:?DIRECTOR_1_ARM_SIGNATURE is required for compose arming}
      - DIRECTOR_2_ARM_SIGNATURE=${DIRECTOR_2_ARM_SIGNATURE:?DIRECTOR_2_ARM_SIGNATURE is required for compose arming}
      - DIRECTOR_3_ARM_SIGNATURE=${DIRECTOR_3_ARM_SIGNATURE:-}
    volumes:
      - ../../../../scripts/arm-vault-compose.sh:/arm-vault.sh:ro
    entrypoint: ["/bin/sh", "/arm-vault.sh"]
    networks: [net_vault]
    depends_on:
      kerosene-vault: { condition: service_started }

  lnd-neutrino:
    image: ${LIGHTNING_LND_IMAGE:-lightninglabs/lnd:v0.20.1-beta}
    container_name: lnd-neutrino
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - BITCOIN_NETWORK=${BITCOIN_NETWORK:-mainnet}
      - LND_GRPC_PORT=${LIGHTNING_LND_PORT:-10009}
      - LND_REST_PORT=${LIGHTNING_LND_REST_PORT:-8080}
      - LND_ALIAS=${LIGHTNING_LND_ALIAS:-kerosene-neutrino}
      - LND_COLOR=${LIGHTNING_LND_COLOR:-#D1495B}
      - LND_NEUTRINO_CONNECT=${LIGHTNING_LND_NEUTRINO_CONNECT:-}
      - LND_NEUTRINO_ADDPEERS=${LIGHTNING_LND_NEUTRINO_ADDPEERS:-}
      - LND_EXTERNAL_IP=${LIGHTNING_LND_EXTERNAL_IP:-}
    volumes:
      - lnd_data:/root/.lnd
      - ../../../../infra/runtime/lightning/lnd-entrypoint.sh:/lnd-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/lnd-entrypoint.sh"]
    networks: [net_tor, tor_egress]

  lnd-bootstrap:
    image: curlimages/curl:8.10.1
    container_name: lnd-bootstrap
    restart: "no"
    env_file: ../../.env
    environment:
      - BITCOIN_NETWORK=${BITCOIN_NETWORK:-mainnet}
      - LND_HOST=lnd-neutrino
      - LND_REST_PORT=${LIGHTNING_LND_REST_PORT:-8080}
      - LND_WALLET_PASSWORD=${LND_WALLET_PASSWORD:?LND_WALLET_PASSWORD is required for production LND bootstrap}
      - LND_BOOTSTRAP_TIMEOUT_SECONDS=${LIGHTNING_LND_BOOTSTRAP_TIMEOUT_SECONDS:-180}
    volumes:
      - lnd_data:/lnd
      - ../../../../infra/runtime/lightning/lnd-bootstrap.sh:/lnd-bootstrap.sh:ro
    entrypoint: ["sh", "/lnd-bootstrap.sh"]
    networks: [net_tor]
    depends_on:
      lnd-neutrino: { condition: service_started }

  # ══════════════════════════════════════════════════════════════════
  # Distributed Infrastructure: SWEDEN (Primary Node)
  # ══════════════════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════════════
  # Distributed Infrastructure: ICELAND (is)
  # ══════════════════════════════════════════════════════════════════

  db-is:
    image: postgres:17-alpine
    container_name: kerosene_db_is
    restart: unless-stopped
    entrypoint: >
      sh -c "
      cp /certs/* /tmp/ &&
      chown postgres:postgres /tmp/server.key &&
      chmod 600 /tmp/server.key &&
      exec docker-entrypoint.sh postgres 
      -c ssl=on 
      -c ssl_cert_file=/tmp/server.crt 
      -c ssl_key_file=/tmp/server.key 
      -c ssl_ca_file=/tmp/rootCA.crt
      "
    environment:
      - POSTGRES_DB=kerosene
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    tmpfs:
      - /tmp:rw,noexec,nosuid
    volumes:
      - pg_data_is:/var/lib/postgresql/data
      - ../postgres/initdb:/docker-entrypoint-initdb.d
      - ../local/certs:/certs:ro
    networks:
      - net_db_is
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kerosene"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis-is:
    image: redis:7-alpine
    container_name: kerosene_redis_is
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data_is:/data
    networks:
      - net_db_is
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  mpc-sidecar-is:
    build:
      context: ../../../mpc-sidecar
    container_name: mpc-sidecar-is
    restart: unless-stopped
    tmpfs:
      - /mnt/mpc-shards:rw,noexec,nosuid,size=64m
    volumes:
      - ../local/certs:/certs:ro
      - mpc_shards_is:/app/encrypted-shards
    environment:
      - MPC_RUNTIME_MODE=HARDWARE_ENCLAVE
      - MPC_REQUIRE_MASTER_KEY=true
      - MPC_MASTER_KEY_B64=${MPC_MASTER_KEY_B64:?MPC_MASTER_KEY_B64 is required}
      - MPC_TLS_CERT_FILE=/certs/server.crt
      - MPC_TLS_KEY_FILE=/certs/server.key
      - MPC_TLS_CA_FILE=/certs/rootCA.crt
    networks:
      - net_mpc
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 50051"]
      interval: 5s
      timeout: 5s
      retries: 12

  shard-identity-init-is:
    image: alpine:3.20
    container_name: kerosene-shard-identity-init-is
    command: ["sh", "-c", "mkdir -p /identity && chown -R 65532:65532 /identity && chmod 700 /identity"]
    restart: "no"
    network_mode: none
    volumes:
      - shard_identity_is:/identity

  kerosene-app-is:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: kerosene-app-is
    restart: unless-stopped
    mem_limit: 768m
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK  # required for mlock() to pin key material in RAM
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /opt/kerosene:rw,noexec,nosuid,size=10m
    volumes:
      - ../host/panic.sh:/opt/kerosene/panic.sh:ro
      - ../local/certs:/certs:ro
      - tor_socks_is:/var/run/tor/socks
      - vanguards_state_is:/var/run/tor/vanguards:ro
      - tor_keys_vault:/vault-onion:ro
      - shard_identity_is:/opt/kerosene/identity
      - lnd_data:/lnd:ro
    env_file: ../../.env
    environment:
      - SPRING_PROFILES_ACTIVE=docker,prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://kerosene_db_is:5432/kerosene?targetServerType=primary&ssl=true&sslmode=verify-ca&sslrootcert=/certs/rootCA.crt&sslcert=/certs/client.crt&sslkey=/certs/client.key.der
      - REGION=IS
      - QUORUM_SHARD_URLS=${QUORUM_SHARD_URLS_IS:-http://kerosene-app-ch:8080,http://kerosene-app-sg:8080}
      - BITCOIN_PLATFORM_MASTER_XPUB=${BITCOIN_PLATFORM_MASTER_XPUB:?BITCOIN_PLATFORM_MASTER_XPUB is required}
      - LIGHTNING_LND_ENABLED=true
      - MPC_SIDECAR_HOST=mpc-sidecar-is
      - MPC_SIDECAR_TLS_ENABLED=true
      - MPC_SIDECAR_TLS_CERT_CHAIN=/certs/client.crt
      - MPC_SIDECAR_TLS_PRIVATE_KEY=/certs/client.key
      - MPC_SIDECAR_TLS_CA=/certs/rootCA.crt
      - SPRING_DATA_REDIS_HOST=kerosene_redis_is
      - VAULT_ENABLED=true
      - VAULT_URL=http://kerosene-vault:8090
      - VAULT_ONION_FILE=/vault-onion/hostname
      - VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS=180000
      - SHARD_ATTESTATION_SECRET=${VAULT_CLUSTER_ATTESTATION_SECRET:?VAULT_CLUSTER_ATTESTATION_SECRET is required}
      - SHARD_IDENTITY_PATH=/opt/kerosene/identity
      - TOR_HEALTH_VANGUARDS_STATE_FILE=/var/run/tor/vanguards/vanguards.state
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS must explicitly list trusted origins}
      - WEBAUTHN_ORIGINS=${WEBAUTHN_ORIGINS:?WEBAUTHN_ORIGINS must explicitly list trusted origins}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:?WEBAUTHN_RP_ID is required}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Kerosene}
    networks:
      net_db_is:
      net_mpc:
      net_tor:
        ipv4_address: 10.241.0.10
      net_vault:
    depends_on:
      db-is: { condition: service_healthy }
      redis-is: { condition: service_healthy }
      mpc-sidecar-is: { condition: service_healthy }
      kerosene-vault-arm: { condition: service_completed_successfully }
      lnd-bootstrap: { condition: service_completed_successfully }
      kerosene-tor-is: { condition: service_healthy }
      kerosene-vanguards-is: { condition: service_healthy }
      shard-identity-init-is: { condition: service_completed_successfully }

