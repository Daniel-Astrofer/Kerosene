networks:
  net_db_is:
  net_db_ch:
  net_db_sg:
  net_vault:
    ipam:
      config:
        - subnet: 172.24.0.0/24
  net_mpc:
  net_tor:
  tor_egress: {}

volumes:
  pg_data_is:
  pg_data_ch:
  pg_data_sg:
