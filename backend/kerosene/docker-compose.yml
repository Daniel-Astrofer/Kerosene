      mpc-sidecar-sg: { condition: service_healthy }
      kerosene-vault-arm: { condition: service_completed_successfully }
      kerosene-tor-vault: { condition: service_healthy }
      kerosene-tor-sg: { condition: service_healthy }
      kerosene-vanguards-sg: { condition: service_healthy }
