      - SPRING_DATASOURCE_URL=jdbc:postgresql://kerosene_db_ch:5432/kerosene?targetServerType=primary&ssl=true&sslmode=verify-ca&sslrootcert=/certs/rootCA.crt&sslcert=/certs/client.crt&sslkey=/certs/client.key.der
      - REGION=CH
      - MPC_SIDECAR_HOST=mpc-sidecar-ch
      - MPC_SIDECAR_TLS_ENABLED=true
      - MPC_SIDECAR_TLS_CERT_CHAIN=/certs/client.crt
      - MPC_SIDECAR_TLS_PRIVATE_KEY=/certs/client.key
      - MPC_SIDECAR_TLS_CA=/certs/rootCA.crt
      - SPRING_DATA_REDIS_HOST=kerosene_redis_ch
      - VAULT_ENABLED=true
      - VAULT_ONION_FILE=/vault-onion/hostname
      - VAULT_PROXY_PATH=/var/run/tor/socks/tor.sock
      - VAULT_BOOTSTRAP_STARTUP_TIMEOUT_MS=180000
      - SHARD_IDENTITY_PATH=/opt/kerosene/identity
      - TOR_HEALTH_VANGUARDS_STATE_FILE=/var/run/tor/vanguards/vanguards.state
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Kerosene}
    networks:
      - net_db_ch
      - net_mpc
      - net_tor
    depends_on:
      db-ch: { condition: service_healthy }
      redis-ch: { condition: service_healthy }
      mpc-sidecar-ch: { condition: service_healthy }
      kerosene-vault-arm: { condition: service_completed_successfully }
      kerosene-tor-vault: { condition: service_healthy }
      kerosene-tor-ch: { condition: service_healthy }
      kerosene-vanguards-ch: { condition: service_healthy }
      shard-identity-init-ch: { condition: service_completed_successfully }

  # ══════════════════════════════════════════════════════════════════
  # Distributed Infrastructure: SINGAPORE (sg)
  # ══════════════════════════════════════════════════════════════════

  db-sg:
    image: postgres:17-alpine
    container_name: kerosene_db_sg
    restart: unless-stopped
    entrypoint: >
      sh -c "
      cp /certs/* /tmp/ &&
      chown postgres:postgres /tmp/server.key &&
      chmod 600 /tmp/server.key &&
      exec docker-entrypoint.sh postgres 
      -c ssl=on 
      -c ssl_cert_file=/tmp/server.crt 
