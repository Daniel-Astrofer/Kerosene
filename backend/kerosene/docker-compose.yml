  # Tor nodes (Identity redundancy)
  kerosene-tor-is:
    image: debian:bookworm-slim
    container_name: kerosene-tor-is
    environment:
      - MASTER_ONION=sc3mol7ughlcsazgt2najfhgbjmwq74gmy4jclnkcjrwc4kc7shmzjad.onion
    volumes:
      - tor_data_is:/var/lib/tor
      - ./tor/torrc-is:/etc/tor/torrc:ro
      - ./tor/entrypoint.sh:/entrypoint.sh:ro
      - tor_keys_is:/var/lib/tor/kerosene_service
      - tor_socks_is:/var/run/tor/socks
      - tor_control_is:/var/run/tor/control
      - ./tor/onion_auth_is:/var/lib/tor/onion_auth:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks: [net_tor, tor_egress]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/tor-ready"]
