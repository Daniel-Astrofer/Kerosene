      - tor_socks_sg:/var/run/tor/socks
      - vanguards_state_sg:/var/run/tor/vanguards:ro
      - tor_keys_vault:/vault-onion:ro
      - shard_identity_sg:/opt/kerosene/identity
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://kerosene_db_sg:5432/kerosene?targetServerType=primary&ssl=true&sslmode=verify-ca&sslrootcert=/certs/rootCA.crt&sslcert=/certs/client.crt&sslkey=/certs/client.key.der
      - REGION=SG
      - MPC_SIDECAR_HOST=mpc-sidecar-sg
      - MPC_SIDECAR_TLS_ENABLED=true
