      context: ./tor/vanguards
      dockerfile: Dockerfile
    container_name: kerosene-vanguards-is
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,size=16m,mode=1777
    volumes:
      - tor_control_is:/var/run/tor/control:ro
      - tor_data_is:/var/lib/tor:ro
      - vanguards_state_is:/var/lib/vanguards
    network_mode: none
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/vanguards-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
