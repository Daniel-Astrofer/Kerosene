networks:
  net_db_is:
  net_db_ch:
  net_db_sg:
  net_vault:
  net_mpc:
  net_tor:
  tor_egress: {}

volumes:
  pg_data_is:
  pg_data_ch:
  pg_data_sg:
  redis_data_is:
  redis_data_ch:
  redis_data_sg:
  tor_keys_is:
  tor_keys_ch:
  tor_keys_sg:
  tor_keys_vault:
  tor_socks_is:
  tor_socks_ch:
  tor_socks_sg:
